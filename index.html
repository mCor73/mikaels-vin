// ========== Render: Event ==========
function renderEvent() {
  const eventName = state.currentId;
  if (!eventName) {
    return `<div class="event-view"><button class="back-btn" id="backBtn">← Back</button><div class="event-empty">Event not found.</div></div>`;
  }

  const wines = state.wines
    .filter(w => (w.event || '') === eventName)
    .sort((a, b) => (a.createdAt || 0) - (b.createdAt || 0));

  if (wines.length === 0) {
    return `<div class="event-view"><button class="back-btn" id="backBtn">← Back</button><div class="event-empty">No wines found for this event.</div></div>`;
  }

  const dates = wines.map(w => w.date).filter(Boolean).sort();
  let dateStr = '';
  if (dates.length) {
    dateStr = dates[0] === dates[dates.length - 1]
      ? formatDate(dates[0])
      : `${formatDate(dates[0])} — ${formatDate(dates[dates.length - 1])}`;
  }

  const rankedCount = wines.filter(w => w.eventRank).length;
  const metaLine = [
    `${wines.length} wine${wines.length === 1 ? '' : 's'}`,
    dateStr,
    rankedCount > 0 ? `${rankedCount} ranked` : ''
  ].filter(Boolean).join(' · ');

  return `
    <div class="event-view">
      <button class="back-btn" id="backBtn">← Back</button>
      <div class="event-header">
        <div class="event-subtitle">Tasting event</div>
        <h1 class="event-title">${escapeHtml(eventName)}</h1>
        <div class="event-meta-line">${metaLine}</div>
      </div>

      <div class="event-list">
        ${wines.map(w => renderEventWineRow(w)).join('')}
      </div>
    </div>
  `;
}

function renderEventWineRow(w) {
  const subtitleParts = [];
  if (w.producer) subtitleParts.push(w.producer);
  if (w.region) subtitleParts.push(w.region);
  if (w.grape) subtitleParts.push(w.grape);
  const subtitle = subtitleParts.join(' · ');
  const rank = w.eventRank || '';

  const rankBtns = SCALE.map(s => `
    <button class="event-rank-btn ${rank === s.value ? 'active' : ''}"
      data-rank-wine-id="${w.id}" data-rank="${s.value}" type="button"
      aria-label="Rank ${s.desc}">${s.label}</button>
  `).join('');

  return `
    <div class="event-wine-row" data-wine-id="${w.id}" data-colour="${escapeHtml(w.colour || '')}">
      <div class="event-wine-info" data-event-wine-id="${w.id}" role="button" tabindex="0">
        <div class="event-wine-head">
          <div class="event-wine-title">${escapeHtml(w.name || 'Untitled')}</div>
          ${w.vintage ? `<span class="event-wine-vintage">${escapeHtml(w.vintage)}</span>` : ''}
          ${w.rating ? `<span class="rating" style="margin-left:auto">${Array.from({length:5},(_,i)=>`<span class="rating-dot${i<w.rating?' filled':''}"></span>`).join('')}</span>` : ''}
        </div>
        ${subtitle ? `<div class="event-wine-subtitle">${escapeHtml(subtitle)}</div>` : ''}
      </div>
      <div class="event-rank">${rankBtns}</div>
    </div>
  `;
}

// ========== Datalists (autocomplete suggestions) ==========
function uniqueValuesOf(key) {
  const set = new Set();
  state.wines.forEach(w => {
    const v = ((w[key] || '') + '').trim();
    if (v) set.add(v);
  });
  return [...set].sort((a, b) => a.localeCompare(b));
}

function buildDatalists() {
  const groups = [
    { id: 'dl-producers', values: uniqueValuesOf('producer') },
    { id: 'dl-regions',   values: uniqueValuesOf('region')   },
    { id: 'dl-grapes',    values: uniqueValuesOf('grape')    },
    { id: 'dl-events',    values: uniqueValuesOf('event')    },
  ];
  return groups.map(g => {
    if (g.values.length === 0) return '';
    const opts = g.values.map(v => `<option value="${escapeHtml(v)}">`).join('');
    return `<datalist id="${g.id}">${opts}</datalist>`;
  }).join('');
}

// ========== Render: Form ==========
function scaleOptions(selected) {
  const none = `<option value=""${!selected ? ' selected' : ''}>—</option>`;
  const opts = SCALE.map(s =>
    `<option value="${s.value}"${s.value === selected ? ' selected' : ''}>${s.label}  ${s.desc}</option>`
  ).join('');
  return none + opts;
}

function selectOptions(list, selected) {
  const none = `<option value=""${!selected ? ' selected' : ''}>—</option>`;
  const opts = list.map(v =>
    `<option value="${escapeHtml(v)}"${v === selected ? ' selected' : ''}>${escapeHtml(v)}</option>`
  ).join('');
  return none + opts;
}

function renderSettings() {
  const draft = state.settingsDraft || { storageType: 'local', dropboxToken: '' };
  const isLocal = draft.storageType === 'local';

            <button type="button" class="btn-connect" id="connectBtn">Connect</button>
          </div>

          <details class="help">
            <summary>How to get a token</summary>

              <ol>
                <li>Go to <a href="https://www.dropbox.com/developers/apps" target="_blank" rel="noopener">dropbox.com/developers/apps</a> and click <strong>Create app</strong>.</li>

                <li>Open the <strong>Permissions</strong> tab and tick <code>files.content.read</code> and <code>files.content.write</code>. Click <strong>Submit</strong>.</li>
                <li>Back in the <strong>Settings</strong> tab, find <em>OAuth 2 → Access token expiration</em>. Set it to <strong>No expiration</strong> if available.</li>
                <li>Under <em>Generated access token</em>, click <strong>Generate</strong> and paste the token above.</li>
              </ol>
              <p style="margin-top:10px;font-size:12px;color:var(--muted);">Your token is stored only on this device. It gives access to one folder in your Dropbox — <code>/Apps/&lt;your app name&gt;/</code> — and nothing else.</p>
            </div>
          </details>
        `}
      </div>
    `;
  }

  return `
    <div class="settings-view">
      <button class="back-btn" id="backBtn">← Home</button>
      <h1 class="form-title"><em>Storage</em></h1>

      <div class="settings-section">

          <div class="radio-dot-wrap"><span class="radio-dot"></span></div>
          <div class="radio-text">
            <div class="radio-title">Browser only</div>
            <div class="radio-desc">Saved on this device. Fast and works offline, but notes don't travel across devices. Use XML export for backups.</div>

        <div class="radio-option ${isDropbox ? 'selected' : ''}" data-storage-choice="dropbox">
          <div class="radio-dot-wrap"><span class="radio-dot"></span></div>
          <div class="radio-text">
            <div class="radio-title">Dropbox</div>
            <div class="radio-desc">Sync across devices using your Dropbox account. Every save is mirrored to a single file in an app folder.</div>
          </div>
        </div>

        ${dropboxDetail}
      </div>

      <div class="settings-section" style="margin-top:12px;font-size:12px;color:var(--muted);line-height:1.6;font-family:'Fraunces',serif;font-style:italic;">
        Regardless of which option you choose, a local copy stays in this browser for speed and offline access.
      </div>

      <div class="version-info">
        Mikael's Vin · <strong>v${APP_VERSION}</strong> · built ${APP_BUILD_DATE}
      </div>

}

// ========== Main render ==========
function renderHomeBtn() {

  if (state.view === 'list') return '';
  return `
    <button class="home-btn" id="homeBtn" type="button" aria-label="Back to cellar">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M3 9.5L12 3l9 6.5V20a1 1 0 0 1-1 1h-5v-7h-6v7H4a1 1 0 0 1-1-1V9.5z"/>
      </svg>
    </button>
  `;
}

function render() {
  const app = document.getElementById('app');

  if (state.loading) {
    app.innerHTML = `<div class="loading"><div class="loading-dot"></div><div class="loading-dot"></div><div class="loading-dot"></div></div>`;
    return;
  }

  let html = '';
  if (state.view === 'list') html = renderList();
  else if (state.view === 'detail') html = renderDetail();
  else if (state.view === 'form') html = renderForm();
  else if (state.view === 'settings') html = renderSettings();
  else if (state.view === 'picker') html = renderPicker();
  else if (state.view === 'event') html = renderEvent();
  else if (state.view === 'grapes') html = renderGrapes();
  else if (state.view === 'tastings') html = renderTastingsView();
  else if (state.view === 'travel') html = renderTravel();
  else if (state.view === 'qr') html = renderQrView();
  else if (state.view === 'trip') html = renderTripDetail();
  else if (state.view === 'quiz-hub') html = renderQuizHub();
  else if (state.view === 'quiz-editor') html = renderQuizEditor();
  else if (state.view === 'quiz-join') html = renderQuizJoin();
  else if (state.view === 'quiz-waiting') html = renderQuizWaiting();
  else if (state.view === 'quiz-play') html = renderQuizPlay();
  else if (state.view === 'quiz-results') html = renderQuizResults();
  else if (state.view === 'cellar') html = renderCellar();
  else if (state.view === 'bottleForm') html = renderBottleForm();
  else if (state.view === 'bottleDetail') html = renderBottleDetail();
  else if (state.view === 'drinkBottle') html = renderDrinkBottle();

  app.innerHTML = html + renderHomeBtn();
  attachEventHandlers();
  updateSyncBadge();

function renderListResultsOnly() {
  const listView = document.querySelector('.list-view');
  if (!listView) { render(); return; }

  const wines = filteredWines();
  const q = state.searchQuery.trim();

  const clearBtn = document.getElementById('searchClear');
  if (clearBtn) clearBtn.classList.toggle('visible', !!q);

  if (wines.length === 0) {
    const why = state.starredOnly && !q
      ? 'No starred wines yet. Tap the star on any wine to mark it.'
      : state.starredOnly && q
      ? `Nothing starred matching "${escapeHtml(q)}".`
      : `Nothing found for "${escapeHtml(q)}". Try a different term.`;
    listView.innerHTML = `<div class="no-results"><div class="empty-title">No matches</div><div class="empty-text">${why}</div></div>`;
    return;
  }

  listView.innerHTML = wines.map(w => renderCard(w, q)).join('');
  bindCardHandlers(listView);
}

function bindCardHandlers(root) {
  (root || document).querySelectorAll('.wine-card').forEach(card => {
    card.addEventListener('click', (e) => {
      if (e.target.closest('.star-btn')) return;
      navigate('detail', card.getAttribute('data-id'));
    });
    card.addEventListener('keydown', (e) => {
      if (e.target.closest('.star-btn')) return;
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        navigate('detail', card.getAttribute('data-id'));
      }
    });
  });

  (root || document).querySelectorAll('.star-btn[data-star-id]').forEach(btn => {
    btn.addEventListener('click', (e) => {
      e.stopPropagation();
      toggleStar(btn.getAttribute('data-star-id'));
    });
  });
}

// ========== Settings handlers ==========
async function handleConnectDropbox() {
  const tokenInput = document.getElementById('f-token');
  const btn = document.getElementById('connectBtn');
  if (!tokenInput || !btn) return;
  const token = tokenInput.value.trim();
  if (!token) { showToast('Paste a token first'); return; }

  btn.disabled = true;
  btn.textContent = 'Checking…';

  let account;
  try {
    account = await dropboxTestToken(token);
  } catch (e) {
    btn.disabled = false;
    btn.textContent = 'Connect';
    showToast(e.message || 'Token check failed');
    return;
  }

  // Token works — determine what to do with existing data
  const accountName = (account.name && account.name.display_name) || account.email || 'Dropbox';

  setSyncStatus('syncing');
  let remoteData = null;
  try {
    const text = await dropboxDownload(token, DROPBOX_FILE_PATH);
    if (text !== null) remoteData = JSON.parse(text);
  } catch (e) {
    console.error(e);
  }

  const localCount = state.wines.length;
  const remoteCount = (remoteData && Array.isArray(remoteData.wines)) ? remoteData.wines.length : 0;

  const finishConnect = async (winesToUse) => {
    state.wines = winesToUse;
    state.config.storageType = 'dropbox';
    state.config.dropboxToken = token;
    state.config.dropboxAccount = accountName;
    state.config.lastSyncedAt = Date.now();
    await saveLocalWines(state.wines);
    await saveConfig(state.config);
    await syncToRemote();
    state.settingsDraft = { storageType: 'dropbox', dropboxToken: token };
    showToast(`Connected as ${accountName}`);
    render();
  };

  if (remoteCount > 0 && localCount > 0) {
    // Conflict — ask
    openActionSheet(
      `Dropbox has ${remoteCount} wine${remoteCount === 1 ? '' : 's'}, this device has ${localCount}`,
      [
        {
          icon: iconDownload(),
          title: 'Use Dropbox data',
          desc: 'Replace this device with what\'s in Dropbox',
          onClick: () => finishConnect(remoteData.wines),
        },
        {
          icon: iconUpload(),
          title: 'Upload this device',
          desc: 'Overwrite Dropbox with what\'s here',
          onClick: () => finishConnect(state.wines),
        },
        {
          icon: iconPlus(),
          title: 'Merge both',
          desc: 'Keep everything from both (skip duplicate IDs)',
          onClick: () => {
            const merged = [...remoteData.wines];
            const ids = new Set(merged.map(w => w.id));
            state.wines.forEach(w => { if (!ids.has(w.id)) merged.push(w); });
            finishConnect(merged);
          },
        },
      ]
    );
    return;
  }

  // No conflict: use whichever has data
  if (remoteCount > 0) await finishConnect(remoteData.wines);
  else await finishConnect(state.wines);
}

async function handleDisconnect() {
  confirmModal(
    'Disconnect Dropbox?',
    'Your local copy stays on this device. Dropbox will no longer be kept in sync from here.',
    'Disconnect',
    async () => {
      state.config.storageType = 'local';
      state.config.dropboxToken = '';
      state.config.dropboxAccount = '';
      state.config.lastSyncedAt = 0;
      await saveConfig(state.config);
      state.settingsDraft = { storageType: 'local', dropboxToken: '' };
      setSyncStatus('idle');
      showToast('Disconnected from Dropbox');
      render();
    }
  );
}

async function handleSyncNow() {
  const remote = await loadFromRemote();
  if (remote && Array.isArray(remote.wines)) {
    state.wines = remote.wines;
    await saveLocalWines(state.wines);
    state.config.lastSyncedAt = Date.now();
    await saveConfig(state.config);
    showToast(`Synced ${remote.wines.length} ${remote.wines.length === 1 ? 'note' : 'notes'}`);
  } else {
    await syncToRemote();
    showToast('Uploaded to Dropbox');
  }
  render();
}

function switchStorageChoice(choice) {
  if (!state.settingsDraft) state.settingsDraft = {};
  state.settingsDraft.storageType = choice;
  render();
}

// ========== Quiz actions ==========
async function saveQuizUserAction() {
  const input = document.getElementById('quizNameInput');
  if (!input) return;
  const name = input.value.trim();
  if (!name) { showToast('Please enter a name'); return; }
  const user = state.quizUser || { id: 'u_' + Date.now().toString(36) + Math.random().toString(36).slice(2, 6) };
  user.name = name;
  state.quizUser = user;
  await saveQuizUser(user);
  state.quizNameDraft = '';
  render();
}

function openQuizNameEdit() {
  state.quizNameDraft = state.quizUser ? state.quizUser.name : '';
  state.quizUser = null; // triggers name entry block
  render();
}

function createNewQuiz() {
  if (!state.quizUser) { showToast('Enter your name first'); return; }
  state.quizDraft = blankQuiz();
  state.quizDraft.questions.push(blankQuestion());
  navigate('quiz-editor');
}

function editExistingQuiz(quizId) {
  const found = state.myQuizzes.find(q => q.id === quizId);
  if (!found) return;
  state.quizDraft = JSON.parse(JSON.stringify(found));
  navigate('quiz-editor');
}

function updateQuizDraftField(which, idx, value, optIdx) {
  if (!state.quizDraft) return;
  if (which === 'title') {
    state.quizDraft.title = value;
  } else if (which === 'qtext') {
    state.quizDraft.questions[idx].text = value;
  } else if (which === 'opt') {
    state.quizDraft.questions[idx].options[optIdx] = value;
  }
}

async function saveQuizDraft() {
  if (!state.quizDraft) return;
  const draft = state.quizDraft;
  if (!draft.title.trim()) draft.title = 'Untitled quiz';
  draft.updatedAt = Date.now();
  const idx = state.myQuizzes.findIndex(q => q.id === draft.id);
  if (idx >= 0) state.myQuizzes[idx] = JSON.parse(JSON.stringify(draft));
  else state.myQuizzes.unshift(JSON.parse(JSON.stringify(draft)));
  await saveMyQuizzes(state.myQuizzes);
  showToast('Draft saved');
  navigate('quiz-hub');
}

async function startLiveQuiz() {
  if (!state.quizDraft) return;
  if (!quizBackendAvailable()) {
    showToast('Quiz backend unavailable');
    return;
  }
  const draft = state.quizDraft;
  draft.status = 'waiting';
  draft.currentQuestion = -1;
  draft.participants = [{
    id: state.quizUser.id,
    name: state.quizUser.name,
    joinedAt: Date.now(),
  }];
  draft.answers = {};
  draft.masterId = state.quizUser.id;
  draft.masterName = state.quizUser.name;
  draft.updatedAt = Date.now();

  // Save to local list of authored quizzes
  const idx = state.myQuizzes.findIndex(q => q.id === draft.id);
  if (idx >= 0) state.myQuizzes[idx] = JSON.parse(JSON.stringify(draft));
  else state.myQuizzes.unshift(JSON.parse(JSON.stringify(draft)));
  await saveMyQuizzes(state.myQuizzes);

  const ok = await pushActiveQuiz(draft);
  if (!ok) { showToast('Could not create quiz — check your connection'); return; }

  state.activeQuiz = draft;
  state.quizRole = 'master';
  navigate('quiz-waiting');
  startQuizPolling();
}

async function masterStartQuestions() {
  if (!state.activeQuiz || state.quizRole !== 'master') return;
  state.activeQuiz.status = 'active';
  state.activeQuiz.currentQuestion = 0;
  state.activeQuiz.updatedAt = Date.now();
  await pushActiveQuiz(state.activeQuiz);
  navigate('quiz-play');
}

async function masterNextQuestion() {
  if (!state.activeQuiz || state.quizRole !== 'master') return;
  const q = state.activeQuiz;
  if (q.currentQuestion < q.questions.length - 1) {
    q.currentQuestion += 1;
    q.updatedAt = Date.now();
    await pushActiveQuiz(q);
    render();
  } else {
    // End the quiz
    await masterEndQuiz();
  }
}

async function masterEndQuiz() {
  if (!state.activeQuiz || state.quizRole !== 'master') return;
  const q = state.activeQuiz;
  q.status = 'ended';
  q.updatedAt = Date.now();
  await pushActiveQuiz(q);
  // Archive
  state.pastQuizzes = [q, ...state.pastQuizzes.filter(p => p.id !== q.id)];
  await savePastQuizzes(state.pastQuizzes);

  state.view = 'quiz-results';
  stopQuizPolling();
  render();
}

async function participantSubmitAnswer() {
  if (!state.activeQuiz || state.quizRole !== 'participant') return;
  if (state.quizMySelection === null) return;

  const qIdx = state.activeQuiz.currentQuestion;
  const updated = await submitAnswerAtomic(
    state.activeQuiz.id,
    state.quizUser.id,
    qIdx,
    state.quizMySelection
  );

  if (!updated) {
    showToast('Could not submit — try again');
    return;
  }

  // If the question has advanced in the meantime, this submission was stale
  if (updated.currentQuestion !== qIdx) {
    state.activeQuiz = updated;
    state.quizMySelection = null;
    state.quizMySubmitted = false;
    render();
    showToast('Question changed — answer the new one');
    return;
  }

  state.activeQuiz = updated;
  state.quizMySubmitted = true;
  render();
}

async function joinQuizWithCode() {
  const input = document.getElementById('joinCodeInput');
  if (!input) return;
  const code = input.value.trim().toUpperCase();
  if (code.length !== 5) { showToast('Enter the full 5-character code'); return; }
  if (!quizBackendAvailable()) {
    showToast('Quiz backend unavailable');
    return;
  }

  const remote = await findQuizByCode(code);
  if (!remote) {
    showToast('No active quiz with that code');
    return;
  }
  if (remote.status === 'ended') {
    showToast('That quiz has already ended');
    return;
  }

  // Atomically append ourselves to participants
  const joined = await joinQuizAtomic(remote.id, {
    id: state.quizUser.id,
    name: state.quizUser.name,
  });
  if (!joined) {
    showToast('Could not join — please try again');
    return;
  }

  state.activeQuiz = joined;
  state.quizRole = 'participant';
  state.quizJoinCode = '';
  if (joined.status === 'waiting') navigate('quiz-waiting');
  else navigate('quiz-play');
  startQuizPolling();
}

function leaveActiveQuiz() {
  confirmModal(
    state.quizRole === 'master' ? 'Cancel this quiz?' : 'Leave this quiz?',
    state.quizRole === 'master'
      ? 'Participants will be notified that the quiz has ended. This cannot be undone.'
      : 'You can rejoin as long as the quiz is still active.',
    state.quizRole === 'master' ? 'Cancel quiz' : 'Leave',
    async () => {
      if (state.quizRole === 'master' && state.activeQuiz) {
        await endActiveQuizRow(state.activeQuiz.id);
      }
      stopQuizPolling();
      state.activeQuiz = null;
      state.quizRole = null;
      state.quizMySelection = null;
      state.quizMySubmitted = false;
      navigate('quiz-hub');
    }
  );
}

function addQuestionToDraft() {
  if (!state.quizDraft) return;
  state.quizDraft.questions.push(blankQuestion());
  render();
}

function removeQuestionFromDraft(idx) {
  if (!state.quizDraft) return;
  state.quizDraft.questions.splice(idx, 1);
  render();
}

function addOptionToQuestion(idx) {
  if (!state.quizDraft) return;
  const q = state.quizDraft.questions[idx];
  if (q.options.length < 6) {
    q.options.push('');
    render();
  }
}

function removeOptionFromQuestion(qIdx, oIdx) {
  if (!state.quizDraft) return;
  const q = state.quizDraft.questions[qIdx];
  if (q.options.length <= 2) return;
  q.options.splice(oIdx, 1);
  if (q.correctIndex === oIdx) q.correctIndex = -1;
  else if (q.correctIndex > oIdx) q.correctIndex -= 1;
  render();
}

function markCorrectAnswer(qIdx, oIdx) {
  if (!state.quizDraft) return;
  const q = state.quizDraft.questions[qIdx];
  q.correctIndex = q.correctIndex === oIdx ? -1 : oIdx;
  render();
}

function selectAnswerInPlay(oIdx) {
  if (state.quizMySubmitted) return;
  state.quizMySelection = oIdx;
  render();
}

async function deleteMyQuiz(quizId) {
  const found = state.myQuizzes.find(q => q.id === quizId);
  if (!found) return;
  const label = found.title || 'this quiz';
  confirmModal(
    'Delete quiz?',
    `"${label}" will be permanently removed from your quizzes. Past results, if any, will stay.`,
    'Delete',
    async () => {
      state.myQuizzes = state.myQuizzes.filter(q => q.id !== quizId);
      await saveMyQuizzes(state.myQuizzes);
      // Also try to remove from Supabase — only succeeds if we're the master
      try {
        const supa = getSupabase();
        if (supa) {
          await supa.from('quizzes').delete()
            .eq('id', quizId)
            .eq('master_id', state.quizUser ? state.quizUser.id : '');
        }
      } catch (e) { /* non-fatal */ }
      showToast('Quiz removed');
      // If we're editing this very quiz, go back to the hub
      if (state.view === 'quiz-editor' && state.quizDraft && state.quizDraft.id === quizId) {
        state.quizDraft = null;
        navigate('quiz-hub');
      } else {
        render();
      }
    }
  );
}

async function deletePastQuiz(quizId) {
  const found = state.pastQuizzes.find(q => q.id === quizId);
  if (!found) return;
  const label = found.title || 'this quiz';
  confirmModal(
    'Delete quiz results?',
    `Remove "${label}" and its leaderboard from your past quizzes? This cannot be undone.`,
    'Delete',
    async () => {
      state.pastQuizzes = state.pastQuizzes.filter(q => q.id !== quizId);
      await savePastQuizzes(state.pastQuizzes);
      // If we were the host, try to also remove from Supabase so it stops appearing in the table
      try {
        const supa = getSupabase();
        if (supa && found.masterId === (state.quizUser ? state.quizUser.id : '')) {
          await supa.from('quizzes').delete()
            .eq('id', quizId)
            .eq('master_id', state.quizUser.id);
        }
      } catch (e) { /* non-fatal */ }
      showToast('Results removed');
      render();
    }
  );
}

function viewPastQuizResults(quizId) {
  const q = state.pastQuizzes.find(x => x.id === quizId);
  if (!q) return;
  state.activeQuiz = q;
  state.quizRole = null;
  navigate('quiz-results');
}

// ========== Event handlers ==========
function attachEventHandlers() {
  const fab = document.getElementById('fabAdd');
  if (fab) fab.addEventListener('click', () => navigate('form'));

  const back = document.getElementById('backBtn');
  if (back) back.addEventListener('click', () => {
    // Quiz view navigation
    if (state.view === 'quiz-editor' || state.view === 'quiz-join' || state.view === 'quiz-results') {
      // Editor/join cleanly back to hub (stop polling if any)
      if (state.view === 'quiz-results') {
        state.activeQuiz = null;
      }
      navigate('quiz-hub');
      return;
    }
    if (state.view === 'quiz-waiting' || state.view === 'quiz-play') {
      // Confirm leave
      leaveActiveQuiz();
      return;
    }
    if (state.view === 'quiz-hub') {
      navigate('list');
      return;
    }
    if (state.view === 'form' && state.editingId) navigate('detail', state.editingId);
    else navigate('list');
  });

  const menuBtn = document.getElementById('menuBtn');
  if (menuBtn) menuBtn.addEventListener('click', openMainMenu);

  const searchInput = document.getElementById('searchInput');
  if (searchInput) {
    searchInput.addEventListener('input', (e) => {
      state.searchQuery = e.target.value;
      renderListResultsOnly();
    });
  }

  const searchClear = document.getElementById('searchClear');
  if (searchClear) searchClear.addEventListener('click', () => {
    state.searchQuery = '';
    if (searchInput) { searchInput.value = ''; searchInput.focus(); }
    renderListResultsOnly();
  });

  const filterStar = document.getElementById('filterStarBtn');
  if (filterStar) filterStar.addEventListener('click', () => {
    state.starredOnly = !state.starredOnly;
    filterStar.classList.toggle('active', state.starredOnly);
    filterStar.innerHTML = starSVG(state.starredOnly);
    filterStar.setAttribute('aria-label', state.starredOnly ? 'Show all' : 'Show only starred');
    renderListResultsOnly();
  });

  bindCardHandlers(document);

  const detailStar = document.getElementById('detailStar');
  if (detailStar) detailStar.addEventListener('click', () => {
    toggleStar(detailStar.getAttribute('data-star-id'));
  });

  const editBtn = document.getElementById('editBtn');
  if (editBtn) editBtn.addEventListener('click', () => navigate('form', state.currentId));

  const deleteBtn = document.getElementById('deleteBtn');
  if (deleteBtn) deleteBtn.addEventListener('click', () => {
    const wine = state.wines.find(w => w.id === state.currentId);
    const name = wine?.name || 'this note';
    confirmModal(
      'Delete this note?',
      `"${name}" will be permanently removed from your cellar.`,
      'Delete',
      async () => {
        state.wines = state.wines.filter(w => w.id !== state.currentId);
        await persist();
        showToast('Note removed');
        navigate('list');
      }
    );
  });

  // Form
  const form = document.getElementById('wineForm');
  if (form) {
    form.addEventListener('input', (e) => {
      if (!state.formDraft || !e.target.name) return;
      state.formDraft[e.target.name] = e.target.value;
    });
    form.addEventListener('change', (e) => {
      if (!state.formDraft || !e.target.name) return;
      state.formDraft[e.target.name] = e.target.value;
    });

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const fd = new FormData(form);
      const rpRaw = (fd.get('rpScore') || '').toString().trim();
      let rp = 0;
      if (rpRaw) {
        rp = parseInt(rpRaw, 10);
        if (isNaN(rp) || rp < 50 || rp > 100) rp = 0;
      }
      const data = {
        ...blankWine(),
        ...state.formDraft,
        name: (fd.get('name') || '').toString().trim(),
        vintage: (fd.get('vintage') || '').toString().trim(),
        date: (fd.get('date') || '').toString().trim() || todayISO(),
        event: (fd.get('event') || '').toString().trim(),
        producer: (fd.get('producer') || '').toString().trim(),
        region: (fd.get('region') || '').toString().trim(),
        grape: (fd.get('grape') || '').toString().trim(),
        colour: (fd.get('colour') || '').toString().trim(),
        style: (fd.get('style') || '').toString().trim(),
        acid: (fd.get('acid') || '').toString().trim(),
        tannin: (fd.get('tannin') || '').toString().trim(),
        body: (fd.get('body') || '').toString().trim(),
        rpScore: rp,
        appearance: (fd.get('appearance') || '').toString().trim(),
        nose: (fd.get('nose') || '').toString().trim(),
        palate: (fd.get('palate') || '').toString().trim(),
        summary: (fd.get('summary') || '').toString().trim(),
      };

      if (!data.name) {
        showToast('Please enter a wine name');
        document.getElementById('f-name')?.focus();
        return;
      }

      const existingIdx = state.wines.findIndex(w => w.id === data.id);
      if (existingIdx >= 0) {
        data.createdAt = state.wines[existingIdx].createdAt || data.createdAt;
        if (typeof data.starred === 'undefined') data.starred = !!state.wines[existingIdx].starred;
        state.wines[existingIdx] = data;
      } else {
        data.createdAt = Date.now();
        state.wines.push(data);
      }

      await persist();
      showToast(state.editingId ? 'Note updated' : 'Note saved');
      navigate('detail', data.id);
    });

    const ratingInput = document.getElementById('ratingInput');
    if (ratingInput) {
      ratingInput.addEventListener('click', (e) => {
        const btn = e.target.closest('.rating-btn');
        if (!btn) return;
        const val = parseInt(btn.getAttribute('data-rating'), 10);
        const newVal = state.formDraft.rating === val ? 0 : val;
        state.formDraft.rating = newVal;
        ratingInput.querySelectorAll('.rating-btn').forEach(b => {
          const n = parseInt(b.getAttribute('data-rating'), 10);
          b.classList.toggle('active', n <= newVal);
        });
      });
    }
  }

  const cancelBtn = document.getElementById('cancelBtn');
  if (cancelBtn) cancelBtn.addEventListener('click', () => {
    if (state.editingId) navigate('detail', state.editingId);
    else navigate('list');
  });

  // Copy-from-previous (form view): open picker
  const copyFromBtn = document.getElementById('copyFromBtn');
  if (copyFromBtn) copyFromBtn.addEventListener('click', () => {
    state.view = 'picker';
    render();
    window.scrollTo(0, 0);
  });

  // Picker items
  document.querySelectorAll('.picker-item[data-pick-id]').forEach(btn => {
    btn.addEventListener('click', () => {
      copyFromWine(btn.getAttribute('data-pick-id'));
    });
  });

  // Add-another (detail view)
  const addAnotherBtn = document.getElementById('addAnotherBtn');
  if (addAnotherBtn) addAnotherBtn.addEventListener('click', () => {
    addAnotherFromWine(state.currentId);
  });

  // Event chip (detail view) -> event view
  const eventChip = document.getElementById('eventChip');
  if (eventChip) eventChip.addEventListener('click', () => {
    const name = eventChip.getAttribute('data-event-name');
    if (name) navigate('event', name);
  });

  // Event view: tap wine row to open detail
  document.querySelectorAll('.event-wine-info[data-event-wine-id]').forEach(el => {
    el.addEventListener('click', () => {
      navigate('detail', el.getAttribute('data-event-wine-id'));
    });
    el.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        navigate('detail', el.getAttribute('data-event-wine-id'));
      }
    });
  });

  // Event view: rank buttons
  document.querySelectorAll('.event-rank-btn[data-rank-wine-id]').forEach(btn => {
    btn.addEventListener('click', () => {
      setEventRank(btn.getAttribute('data-rank-wine-id'), btn.getAttribute('data-rank'));
    });
  });

  // Tastings button (list view)
  const tastingsBtn = document.getElementById('tastingsBtn');
  if (tastingsBtn) tastingsBtn.addEventListener('click', () => navigate('tastings'));

  // Travel button
  const travelBtn = document.getElementById('travelBtn');
  if (travelBtn) travelBtn.addEventListener('click', () => navigate('travel'));

  // QR button (home)
  const qrBtn = document.getElementById('qrBtn');
  if (qrBtn) qrBtn.addEventListener('click', () => {
    state.qrEditDraft = undefined;
    navigate('qr');
  });

  // QR: input
  const qrUrlInput = document.getElementById('qrUrlInput');
  if (qrUrlInput) qrUrlInput.addEventListener('input', (e) => {
    state.qrEditDraft = e.target.value;
  });

  // QR: save override
  const qrSaveUrlBtn = document.getElementById('qrSaveUrlBtn');
  if (qrSaveUrlBtn) qrSaveUrlBtn.addEventListener('click', async () => {
    const input = document.getElementById('qrUrlInput');
    if (!input) return;
    const value = input.value.trim();
    if (value && !/^https?:\/\//i.test(value)) {
      showToast('URL must start with http:// or https://');
      return;
    }
    await saveQrCustomUrl(value);
    state.qrEditDraft = undefined;
    showToast(value ? 'Custom URL saved' : 'Override cleared');
    render();
  });

  // QR: clear override
  const qrClearUrlBtn = document.getElementById('qrClearUrlBtn');
  if (qrClearUrlBtn) qrClearUrlBtn.addEventListener('click', async () => {
    await saveQrCustomUrl('');
    state.qrEditDraft = undefined;
    showToast('Using auto-detected URL');
    render();
  });

  // QR: copy link
  const qrCopyBtn = document.getElementById('qrCopyBtn');
  if (qrCopyBtn) qrCopyBtn.addEventListener('click', async () => {
    const url = qrCurrentUrl();
    if (!url) return;
    try {
      await navigator.clipboard.writeText(url);
      showToast('Link copied');
    } catch (e) {
      // Fallback
      const tmp = document.createElement('textarea');
      tmp.value = url;
      document.body.appendChild(tmp);
      tmp.select();
      try { document.execCommand('copy'); showToast('Link copied'); }
      catch (e2) { showToast('Could not copy'); }
      document.body.removeChild(tmp);
    }
  });

  // QR: native share
  const qrShareBtn = document.getElementById('qrShareBtn');
  if (qrShareBtn) qrShareBtn.addEventListener('click', async () => {
    const url = qrCurrentUrl();
    if (!url) return;
    try {
      await navigator.share({
        title: 'Mikael\'s Vin',
        text: 'Mikael\'s Vin — a wine journal',
        url: url,
      });
    } catch (e) { /* user cancelled */ }
  });

  // Trip cards
  document.querySelectorAll('.trip-card[data-trip-id]').forEach(card => {
    card.addEventListener('click', () => navigate('trip', card.getAttribute('data-trip-id')));
  });

  // Library button (list view)
  const libraryBtn = document.getElementById('libraryBtn');
  if (libraryBtn) libraryBtn.addEventListener('click', () => navigate('grapes'));

  // Quiz home button
  const quizHomeBtn = document.getElementById('quizHomeBtn');
  if (quizHomeBtn) quizHomeBtn.addEventListener('click', () => {
    // If there's an active quiz, resume into its current screen
    if (state.activeQuiz && (state.activeQuiz.status === 'waiting' || state.activeQuiz.status === 'active')) {
      if (state.activeQuiz.status === 'waiting') navigate('quiz-waiting');
      else navigate('quiz-play');
    } else {
      navigate('quiz-hub');
    }
  });

  // Resume active quiz from banner
  const activeQuizResumeBtn = document.getElementById('activeQuizResumeBtn');
  if (activeQuizResumeBtn) activeQuizResumeBtn.addEventListener('click', () => {
    if (state.activeQuiz.status === 'waiting') navigate('quiz-waiting');
    else navigate('quiz-play');
  });

  // Quiz: save name
  const saveQuizNameBtn = document.getElementById('saveQuizNameBtn');
  if (saveQuizNameBtn) saveQuizNameBtn.addEventListener('click', saveQuizUserAction);

  const quizNameInput = document.getElementById('quizNameInput');
  if (quizNameInput) {
    quizNameInput.addEventListener('input', (e) => {
      state.quizNameDraft = e.target.value;
    });
    quizNameInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') { e.preventDefault(); saveQuizUserAction(); }
    });
  }

  const editQuizNameBtn = document.getElementById('editQuizNameBtn');
  if (editQuizNameBtn) editQuizNameBtn.addEventListener('click', openQuizNameEdit);

  // Quiz: main hub actions
  const createQuizBtn = document.getElementById('createQuizBtn');
  if (createQuizBtn) createQuizBtn.addEventListener('click', createNewQuiz);

  const joinQuizBtn = document.getElementById('joinQuizBtn');
  if (joinQuizBtn) joinQuizBtn.addEventListener('click', () => navigate('quiz-join'));

  document.querySelectorAll('[data-my-quiz-id]').forEach(el => {
    el.addEventListener('click', (e) => {
      // Ignore clicks that bubble up from the delete button
      if (e.target.closest('[data-delete-my-quiz]')) return;
      editExistingQuiz(el.getAttribute('data-my-quiz-id'));
    });
  });

  document.querySelectorAll('[data-past-quiz-id]').forEach(el => {
    el.addEventListener('click', (e) => {
      if (e.target.closest('[data-delete-past-quiz]')) return;
      viewPastQuizResults(el.getAttribute('data-past-quiz-id'));
    });
  });

  // Delete buttons on quiz rows
  document.querySelectorAll('[data-delete-my-quiz]').forEach(el => {
    el.addEventListener('click', (e) => {
      e.stopPropagation();
      deleteMyQuiz(el.getAttribute('data-delete-my-quiz'));
    });
  });

  document.querySelectorAll('[data-delete-past-quiz]').forEach(el => {
    el.addEventListener('click', (e) => {
      e.stopPropagation();
      deletePastQuiz(el.getAttribute('data-delete-past-quiz'));
    });
  });

  // Quiz editor
  const quizTitle = document.getElementById('quizTitle');
  if (quizTitle) quizTitle.addEventListener('input', (e) => {
    updateQuizDraftField('title', null, e.target.value);
  });

  document.querySelectorAll('[data-q-text]').forEach(el => {
    el.addEventListener('input', (e) => {
      const idx = parseInt(el.getAttribute('data-q-text'), 10);
      updateQuizDraftField('qtext', idx, e.target.value);
    });
  });

  document.querySelectorAll('[data-opt-text-q]').forEach(el => {
    el.addEventListener('input', (e) => {
      const qIdx = parseInt(el.getAttribute('data-opt-text-q'), 10);
      const oIdx = parseInt(el.getAttribute('data-opt-text-o'), 10);
      updateQuizDraftField('opt', qIdx, e.target.value, oIdx);
    });
  });

  document.querySelectorAll('[data-mark-correct-q]').forEach(el => {
    el.addEventListener('click', () => {
      const qIdx = parseInt(el.getAttribute('data-mark-correct-q'), 10);
      const oIdx = parseInt(el.getAttribute('data-mark-correct-o'), 10);
      markCorrectAnswer(qIdx, oIdx);
    });
  });

  document.querySelectorAll('[data-delete-question]').forEach(el => {
    el.addEventListener('click', () => {
      removeQuestionFromDraft(parseInt(el.getAttribute('data-delete-question'), 10));
    });
  });

  document.querySelectorAll('[data-add-opt]').forEach(el => {
    el.addEventListener('click', () => {
      addOptionToQuestion(parseInt(el.getAttribute('data-add-opt'), 10));
    });
  });

  document.querySelectorAll('[data-remove-opt-q]').forEach(el => {
    el.addEventListener('click', () => {
      const qIdx = parseInt(el.getAttribute('data-remove-opt-q'), 10);
      const oIdx = parseInt(el.getAttribute('data-remove-opt-o'), 10);
      removeOptionFromQuestion(qIdx, oIdx);
    });
  });

  const addQuestionBtn = document.getElementById('addQuestionBtn');
  if (addQuestionBtn) addQuestionBtn.addEventListener('click', addQuestionToDraft);

  const saveDraftBtn = document.getElementById('saveDraftBtn');
  if (saveDraftBtn) saveDraftBtn.addEventListener('click', saveQuizDraft);

  const deleteQuizBtn = document.getElementById('deleteQuizBtn');
  if (deleteQuizBtn) deleteQuizBtn.addEventListener('click', () => {
    if (state.quizDraft) deleteMyQuiz(state.quizDraft.id);
  });

  const startQuizBtn = document.getElementById('startQuizBtn');
  if (startQuizBtn) startQuizBtn.addEventListener('click', startLiveQuiz);

  // Quiz: join
  const joinWithCodeBtn = document.getElementById('joinWithCodeBtn');
  if (joinWithCodeBtn) joinWithCodeBtn.addEventListener('click', joinQuizWithCode);

  const joinCodeInput = document.getElementById('joinCodeInput');
  if (joinCodeInput) {
    joinCodeInput.addEventListener('input', (e) => {
      state.quizJoinCode = e.target.value.toUpperCase();
    });
    joinCodeInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') { e.preventDefault(); joinQuizWithCode(); }
    });
  }

  // Quiz: master waiting room - start
  const startNowBtn = document.getElementById('startNowBtn');
  if (startNowBtn) startNowBtn.addEventListener('click', masterStartQuestions);

  // Quiz: master gameplay controls
  const nextQuestionBtn = document.getElementById('nextQuestionBtn');
  if (nextQuestionBtn) nextQuestionBtn.addEventListener('click', masterNextQuestion);

  const endQuizBtn = document.getElementById('endQuizBtn');
  if (endQuizBtn) endQuizBtn.addEventListener('click', leaveActiveQuiz);

  // Quiz: participant answer selection / submit
  document.querySelectorAll('[data-answer-opt]').forEach(el => {
    el.addEventListener('click', () => {
      if (el.hasAttribute('disabled')) return;
      selectAnswerInPlay(parseInt(el.getAttribute('data-answer-opt'), 10));
    });
  });

  const submitAnswerBtn = document.getElementById('submitAnswerBtn');
  if (submitAnswerBtn) submitAnswerBtn.addEventListener('click', participantSubmitAnswer);


  // Tasting rows on home
  document.querySelectorAll('.tasting-row[data-tasting-event]').forEach(row => {
    row.addEventListener('click', () => {
      navigate('event', row.getAttribute('data-tasting-event'));
    });
  });

  // Cellar shortcut (list view)
  const cellarShortcut = document.getElementById('cellarShortcut');
  if (cellarShortcut) cellarShortcut.addEventListener('click', () => navigate('cellar'));

  // Cellar view: add button
  const fabAddBottle = document.getElementById('fabAddBottle');
  if (fabAddBottle) fabAddBottle.addEventListener('click', () => {
    state.bottleDraft = blankBottle();
    state.bottleEditingId = null;
    navigate('bottleForm');
  });

  // Cellar view: search
  const cellarSearchInput = document.getElementById('cellarSearchInput');
  if (cellarSearchInput) {
    cellarSearchInput.addEventListener('input', (e) => {
      state.cellarSearch = e.target.value;
      render();
      const s = document.getElementById('cellarSearchInput');
      if (s) {
        s.focus();
        const end = s.value.length;
        try { s.setSelectionRange(end, end); } catch(e){}
      }
    });
  }
  const cellarSearchClear = document.getElementById('cellarSearchClear');
  if (cellarSearchClear) cellarSearchClear.addEventListener('click', () => {
    state.cellarSearch = '';
    render();
  });

  // Cellar view: location filter chips
  document.querySelectorAll('.cellar-filter-chip[data-loc-filter]').forEach(chip => {
    chip.addEventListener('click', () => {
      state.cellarLocationFilter = chip.getAttribute('data-loc-filter');
      render();
    });
  });

  // Cellar view: bottle cards
  document.querySelectorAll('.bottle-card[data-bottle-id]').forEach(card => {
    card.addEventListener('click', () => {
      navigate('bottleDetail', card.getAttribute('data-bottle-id'));
    });
    card.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' || e.key === ' ') {
        e.preventDefault();
        navigate('bottleDetail', card.getAttribute('data-bottle-id'));
      }
    });
  });

  // Bottle detail: action buttons
  const drinkBtn = document.getElementById('drinkBtn');
  if (drinkBtn) drinkBtn.addEventListener('click', () => {
    state.formDraft = null;
    navigate('drinkBottle', state.currentBottleId);
  });

  const relocateBtn = document.getElementById('relocateBtn');
  if (relocateBtn) relocateBtn.addEventListener('click', () => {
    relocateBottle(state.currentBottleId);
  });

  const editBottleBtn = document.getElementById('editBottleBtn');
  if (editBottleBtn) editBottleBtn.addEventListener('click', () => {
    navigate('bottleForm', state.currentBottleId);
  });

  const removeBtn = document.getElementById('removeBtn');
  if (removeBtn) removeBtn.addEventListener('click', () => {
    removeBottle(state.currentBottleId);
  });

  // Bottle form: photo capture
  const photoCapture = document.getElementById('photoCapture');
  const photoInput = document.getElementById('photoInput');
  if (photoCapture && photoInput) {
    photoCapture.addEventListener('click', (e) => {
      if (e.target.closest('.photo-controls')) return; // let control buttons handle
      photoInput.click();
    });
    photoInput.addEventListener('change', async (e) => {
      const file = e.target.files && e.target.files[0];
      if (file) await handlePhotoSelected(file);
      e.target.value = '';
    });
  }

  const retakePhotoBtn = document.getElementById('retakePhotoBtn');
  if (retakePhotoBtn) retakePhotoBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    if (photoInput) photoInput.click();
  });

  const removePhotoBtn = document.getElementById('removePhotoBtn');
  if (removePhotoBtn) removePhotoBtn.addEventListener('click', (e) => {
    e.stopPropagation();
    if (state.bottleDraft) {
      state.bottleDraft.photo = '';
      render();
    }
  });

  // Bottle form: inputs
  const bottleFormEl = document.getElementById('bottleFormEl');
  if (bottleFormEl) {
    bottleFormEl.addEventListener('input', (e) => {
      if (!state.bottleDraft || !e.target.name) return;
      const v = e.target.value;
      if (e.target.name === 'quantity') {
        state.bottleDraft[e.target.name] = Math.max(1, parseInt(v, 10) || 1);
      } else {
        state.bottleDraft[e.target.name] = v;
      }
    });
    bottleFormEl.addEventListener('change', (e) => {
      if (!state.bottleDraft || !e.target.name) return;
      state.bottleDraft[e.target.name] = e.target.value;
    });
    bottleFormEl.addEventListener('submit', (e) => {
      e.preventDefault();
      // Capture final form values
      const fd = new FormData(bottleFormEl);
      for (const [k, v] of fd.entries()) {
        if (state.bottleDraft) {
          if (k === 'quantity') state.bottleDraft[k] = Math.max(1, parseInt(v, 10) || 1);
          else state.bottleDraft[k] = (v || '').toString().trim();
        }
      }
      addOrUpdateBottle();
    });
  }

  // Drink form
  const drinkFormEl = document.getElementById('drinkFormEl');
  if (drinkFormEl) {
    drinkFormEl.addEventListener('input', (e) => {
      if (!state.formDraft || !e.target.name) return;
      state.formDraft[e.target.name] = e.target.value;
    });
    drinkFormEl.addEventListener('submit', (e) => {
      e.preventDefault();
      const fd = new FormData(drinkFormEl);
      const overrides = {};
      for (const [k, v] of fd.entries()) overrides[k] = v;
      saveDrinkNote(state.currentBottleId, overrides);
    });

    // Rating buttons inside drink form
    const ratingInput = document.getElementById('ratingInput');
    if (ratingInput) {
      ratingInput.addEventListener('click', (e) => {
        const btn = e.target.closest('.rating-btn');
        if (!btn) return;
        const val = parseInt(btn.getAttribute('data-rating'), 10);
        if (!state.formDraft) state.formDraft = blankWine();
        const newVal = state.formDraft.rating === val ? 0 : val;
        state.formDraft.rating = newVal;
        ratingInput.querySelectorAll('.rating-btn').forEach(b => {
          const n = parseInt(b.getAttribute('data-rating'), 10);
          b.classList.toggle('active', n <= newVal);
        });
      });
    }
  }

  // Home button (any non-list view)
  const homeBtn = document.getElementById('homeBtn');
  if (homeBtn) homeBtn.addEventListener('click', () => {
    if (state.view === 'quiz-waiting' || state.view === 'quiz-play') {
      confirmModal(
        'Leave the quiz?',
        'You can come back via the quiz button on the home page as long as the quiz is still active.',
        'Leave',
        () => { stopQuizPolling(); navigate('list'); }
      );
      return;
    }
    navigate('list');
  });

  // Grapes view: filter buttons
  document.querySelectorAll('.grape-filter-btn[data-grape-filter]').forEach(btn => {
    btn.addEventListener('click', () => {
      state.grapesFilter = btn.getAttribute('data-grape-filter');
      render();
    });
  });

  // Grapes view: search
  const grapesSearch = document.getElementById('grapesSearch');
  if (grapesSearch) {
    grapesSearch.addEventListener('input', (e) => {
      state.grapesSearch = e.target.value;
      render();
      // Restore focus
      const s = document.getElementById('grapesSearch');
      if (s) {
        s.focus();
        const end = s.value.length;
        try { s.setSelectionRange(end, end); } catch(e){}
      }
    });
  }

  const grapesSearchClear = document.getElementById('grapesSearchClear');
  if (grapesSearchClear) grapesSearchClear.addEventListener('click', () => {
    state.grapesSearch = '';
    render();
    const s = document.getElementById('grapesSearch');
    if (s) s.focus();
  });

  // Settings view
  document.querySelectorAll('.radio-option[data-storage-choice]').forEach(el => {
    el.addEventListener('click', () => {
      switchStorageChoice(el.getAttribute('data-storage-choice'));
    });
  });

  const tokenField = document.getElementById('f-token');
  if (tokenField) {
    tokenField.addEventListener('input', (e) => {
      if (state.settingsDraft) state.settingsDraft.dropboxToken = e.target.value;
    });
  }

  const connectBtn = document.getElementById('connectBtn');
  if (connectBtn) connectBtn.addEventListener('click', handleConnectDropbox);

  const disconnectBtn = document.getElementById('disconnectBtn');
  if (disconnectBtn) disconnectBtn.addEventListener('click', handleDisconnect);

  const syncNowBtn = document.getElementById('syncNowBtn');
  if (syncNowBtn) syncNowBtn.addEventListener('click', handleSyncNow);
}

loadWines();
</script>
</body>
</html>
