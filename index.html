// ----- Realtime subscription -----
let quizChannel = null;

function stopQuizPolling() {
  // Name kept for backwards compatibility with rest of the code
  if (quizChannel) {
    try {
      const supa = getSupabase();
      if (supa) supa.removeChannel(quizChannel);
    } catch (e) { /* no-op */ }
    quizChannel = null;
  }
  if (state.quizPollTimer) {
    clearInterval(state.quizPollTimer);
    state.quizPollTimer = null;
  }
}

async function handleRemoteQuizUpdate(remote) {
  if (!remote) return;
  if (!state.activeQuiz || remote.id !== state.activeQuiz.id) return;
  if ((remote.updatedAt || 0) < (state.activeQuiz.updatedAt || 0)) return;

  const prevQIdx = state.activeQuiz.currentQuestion;
  const prevStatus = state.activeQuiz.status;
  state.activeQuiz = remote;

  // Participant: reset selection when question advances
  if (state.quizRole === 'participant' && remote.currentQuestion !== prevQIdx) {
    state.quizMySelection = null;
    state.quizMySubmitted = false;
  }

  // Transition views
  if (remote.status === 'ended' && prevStatus !== 'ended') {
    state.pastQuizzes = [remote, ...state.pastQuizzes.filter(p => p.id !== remote.id)];
    await savePastQuizzes(state.pastQuizzes);
    if (state.view === 'quiz-play' || state.view === 'quiz-waiting') {
      state.view = 'quiz-results';
    }
    stopQuizPolling();
  } else if (remote.status === 'active' && state.view === 'quiz-waiting' && state.quizRole === 'participant') {
    state.view = 'quiz-play';
  }

  render();
}

// Start listening to a specific quiz row for realtime updates.
// The intervalMs parameter is kept for signature compatibility but ignored —
// Supabase pushes updates rather than polling.
function startQuizPolling(_intervalMs) {
  stopQuizPolling();
  const supa = getSupabase();
  if (!supa || !state.activeQuiz) return;
  const quizId = state.activeQuiz.id;

  quizChannel = supa
    .channel('quiz-' + quizId)
    .on(
      'postgres_changes',
      { event: '*', schema: 'public', table: 'quizzes', filter: 'id=eq.' + quizId },
      async (payload) => {
        const remote = rowToQuiz(payload.new || payload.record);
        if (remote) await handleRemoteQuizUpdate(remote);
      }
    )
    .subscribe((status) => {
      // If the realtime channel fails, fall back to short-interval polling as a safety net
      if (status === 'CHANNEL_ERROR' || status === 'TIMED_OUT' || status === 'CLOSED') {
        if (state.activeQuiz && !state.quizPollTimer) {
          state.quizPollTimer = setInterval(async () => {
            const fresh = await pullActiveQuiz();
            if (fresh) await handleRemoteQuizUpdate(fresh);
          }, 5000);
        }
      }
    });
}

// ========== Sync orchestration ==========
function setSyncStatus(status, detail) {
  state.syncStatus = status;
  state.syncStatusDetail = detail || '';
  updateSyncBadge();
}

function updateSyncBadge() {
  const badge = document.getElementById('syncBadge');
  if (!badge) return;

  if (state.config.storageType !== 'dropbox') {
    badge.style.display = 'none';
    return;
  }
  badge.style.display = 'inline-flex';
  badge.className = 'sync-badge';

  let text = 'Synced';
  if (state.syncStatus === 'syncing') {
    badge.classList.add('syncing');
    text = 'Syncing';
  } else if (state.syncStatus === 'error') {
    badge.classList.add('error');
    text = 'Offline';
  } else {
    text = 'Dropbox';
  }
  badge.innerHTML = `<span class="sync-dot"></span>${text}`;
}

async function syncToRemote() {
  if (state.config.storageType !== 'dropbox' || !state.config.dropboxToken) return;
  setSyncStatus('syncing');
  try {
    const payload = JSON.stringify({
      version: 2,
      updatedAt: Date.now(),
      wines: state.wines,
      cellar: state.cellar,
    });
    await dropboxUpload(state.config.dropboxToken, DROPBOX_FILE_PATH, payload);
    state.config.lastSyncedAt = Date.now();
    await saveConfig(state.config);
    setSyncStatus('synced');
  } catch (e) {
    console.error('Sync failed', e);
    setSyncStatus('error', e.message);
    showToast('Sync failed — saved locally');
  }
}

async function loadFromRemote() {
  if (state.config.storageType !== 'dropbox' || !state.config.dropboxToken) return null;
  setSyncStatus('syncing');
  try {
    const text = await dropboxDownload(state.config.dropboxToken, DROPBOX_FILE_PATH);
    if (text === null) {
      setSyncStatus('synced');
      return null; // no file yet
    }
    const data = JSON.parse(text);
    setSyncStatus('synced');
    return data;
  } catch (e) {
    console.error('Remote load failed', e);
    setSyncStatus('error', e.message);
    return null;
  }
}

// ========== Main save/load ==========
async function persist() {
  // Always write local
  await saveLocalWines(state.wines);
  // Fire-and-forget remote sync
  syncToRemote();
}

async function persistCellar() {
  await saveLocalCellar(state.cellar);
  syncToRemote();
}

async function loadWines() {
  // Load config first
  state.config = await loadConfig();

  // Load local cache (fast)
  state.wines = await loadLocalWines();
  state.cellar = await loadLocalCellar();

  // Quiz data
  state.quizUser = await loadQuizUser();
  state.myQuizzes = await loadMyQuizzes();
  state.pastQuizzes = await loadPastQuizzes();

  // QR custom URL override
  try {
    const qrRes = await window.storage.get(QR_URL_KEY);
    if (qrRes && qrRes.value) state.qrCustomUrl = qrRes.value;
  } catch (e) { /* no-op */ }

  state.loading = false;
  render();

  // Then attempt remote refresh
  if (state.config.storageType === 'dropbox' && state.config.dropboxToken) {
    const remote = await loadFromRemote();
    if (remote) {
      if (Array.isArray(remote.wines)) {
        state.wines = remote.wines;
        await saveLocalWines(state.wines);
      }
      if (Array.isArray(remote.cellar)) {
        state.cellar = remote.cellar;
        await saveLocalCellar(state.cellar);
      }
      if (state.view === 'list') render();
    }
  }
}

// ========== Helpers ==========
function uid() { return 'w_' + Date.now().toString(36) + Math.random().toString(36).slice(2, 8); }

function todayISO() {
  const d = new Date();
  const tz = d.getTimezoneOffset() * 60000;
  return new Date(d - tz).toISOString().slice(0, 10);
}

function formatDate(iso) {
  if (!iso) return '';
  try {
    const d = new Date(iso + 'T00:00:00');
    return d.toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' });
  } catch (e) { return iso; }
}

function formatRelative(ts) {
  if (!ts) return 'never';
  const diff = Date.now() - ts;
  const sec = Math.floor(diff / 1000);
  if (sec < 60) return 'just now';
  const min = Math.floor(sec / 60);
  if (min < 60) return `${min}m ago`;
  const hr = Math.floor(min / 60);
  if (hr < 24) return `${hr}h ago`;
  const day = Math.floor(hr / 24);
  if (day < 30) return `${day}d ago`;
  return formatDate(new Date(ts).toISOString().slice(0, 10));
}

function escapeHtml(s) {
  if (s === null || s === undefined) return '';
  return String(s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#039;');
}

function escapeXml(s) {
  if (s === null || s === undefined) return '';
  return String(s)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&apos;');
}

function highlight(text, query) {
  if (!query || !text) return escapeHtml(text);
  const safe = escapeHtml(text);
  const q = query.trim();
  if (!q) return safe;
  const pattern = q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  const re = new RegExp('(' + pattern + ')', 'gi');
  return safe.replace(re, '<mark>$1</mark>');
}

function sortedWines() {
  return [...state.wines].sort((a, b) => {
    const da = a.date || '';
    const db = b.date || '';
    if (db !== da) return db.localeCompare(da);
    return (b.createdAt || 0) - (a.createdAt || 0);
  });
}

function filteredWines() {
  const q = state.searchQuery.trim().toLowerCase();
  let wines = sortedWines();
  if (state.starredOnly) wines = wines.filter(w => w.starred);
  if (!q) return wines;
  return wines.filter(w => {
    const haystack = [
      w.name, w.vintage, w.event, w.colour, w.style,
      w.producer, w.region, w.grape,
      w.appearance, w.nose, w.palate, w.summary,
      w.rpScore ? 'rp ' + w.rpScore : ''
    ].map(v => (v || '').toString().toLowerCase()).join(' \n ');
    return haystack.includes(q);
  });
}

// ========== Tastings (grouped by event) ==========
function computeTastings(wines) {
  const groups = new Map(); // eventName -> { name, wines, dates, colours }
  wines.forEach(w => {
    const evt = (w.event || '').trim();
    if (!evt) return;
    if (!groups.has(evt)) {
      groups.set(evt, { name: evt, wines: [], dates: [], colours: new Set() });
    }
    const g = groups.get(evt);
    g.wines.push(w);
    if (w.date) g.dates.push(w.date);
    if (w.colour) g.colours.add(w.colour);
  });

  // Sort each group by most recent tasting date
  const result = [...groups.values()].map(g => {
    g.dates.sort();
    return g;
  });

  // Sort groups by their most recent date (desc), then by wine count (desc)
  result.sort((a, b) => {
    const da = a.dates.length ? a.dates[a.dates.length - 1] : '';
    const db = b.dates.length ? b.dates[b.dates.length - 1] : '';
    if (db !== da) return db.localeCompare(da);
    return b.wines.length - a.wines.length;
  });

  return result;
}

// ========== Stats ==========
function computeStats(wines) {
  const total = wines.length;
  const starred = wines.filter(w => w.starred).length;

  const rated = wines.filter(w => w.rating > 0);
  const avgRating = rated.length
    ? Math.round((rated.reduce((s, w) => s + (w.rating || 0), 0) / rated.length) * 10) / 10
    : 0;

  const thisYear = new Date().getFullYear();
  const yearCount = wines.filter(w => (w.date || '').startsWith(String(thisYear))).length;

  const colourCounts = {};
  wines.forEach(w => {
    if (w.colour) colourCounts[w.colour] = (colourCounts[w.colour] || 0) + 1;
  });
  const colourEntries = Object.entries(colourCounts).sort((a, b) => b[1] - a[1]);
  const colouredCount = colourEntries.reduce((s, [, c]) => s + c, 0);

  return { total, starred, avgRating, yearCount, colourEntries, colouredCount };
}

// ========== Toast ==========
let toastTimer = null;
function showToast(msg) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => toast.classList.remove('show'), 2500);
}

// ========== Modals ==========
function confirmModal(title, text, confirmLabel, onConfirm) {
  const overlay = document.getElementById('overlay');
  document.getElementById('modalTitle').textContent = title;
  document.getElementById('modalText').textContent = text;
  const confirmBtn = document.getElementById('modalConfirm');
  confirmBtn.textContent = confirmLabel;

  const cleanup = () => {
    overlay.classList.remove('show');
    confirmBtn.onclick = null;
    document.getElementById('modalCancel').onclick = null;
  };
  confirmBtn.onclick = () => { cleanup(); onConfirm(); };
  document.getElementById('modalCancel').onclick = cleanup;
  overlay.onclick = (e) => { if (e.target === overlay) cleanup(); };
  overlay.classList.add('show');
}

function openActionSheet(sub, items) {
  const overlay = document.getElementById('sheetOverlay');
  const itemsEl = document.getElementById('sheetItems');
  const subEl = document.getElementById('sheetSub');
  const cancelBtn = document.getElementById('sheetCancel');

  subEl.innerHTML = sub || '';
  itemsEl.innerHTML = items.map((it, i) => `
    <button class="sheet-item" data-sheet-idx="${i}">
      <span class="sheet-icon">${it.icon || ''}</span>
      <span class="sheet-item-text">
        <span class="sheet-item-title">${escapeHtml(it.title)}</span>
        ${it.desc ? `<span class="sheet-item-desc">${escapeHtml(it.desc)}</span>` : ''}
      </span>
    </button>
  `).join('');

  const cleanup = () => {
    overlay.classList.remove('show');
    overlay.onclick = null;
    cancelBtn.onclick = null;
    itemsEl.querySelectorAll('.sheet-item').forEach(b => b.onclick = null);
  };

  itemsEl.querySelectorAll('.sheet-item').forEach(btn => {
    btn.onclick = () => {
      const idx = parseInt(btn.getAttribute('data-sheet-idx'), 10);
      cleanup();
      try { items[idx].onClick(); } catch (e) { console.error(e); }
    };
  });

  cancelBtn.onclick = cleanup;
  overlay.onclick = (e) => { if (e.target === overlay) cleanup(); };
  overlay.classList.add('show');
}

// ========== XML Export ==========
function buildXML(wines) {
  const now = new Date().toISOString();
  const N = 'n' + 'ame';
  const lines = [];
  lines.push('<?xml version="1.0" encoding="UTF-8"?>');
  lines.push(`<cellar version="1" exported="${escapeXml(now)}" count="${wines.length}">`);
  for (const w of wines) {
    lines.push(`  <wine id="${escapeXml(w.id || '')}">`);
    lines.push(`    <${N}>${escapeXml(w.name || '')}</${N}>`);
    if (w.producer) lines.push(`    <producer>${escapeXml(w.producer)}</producer>`);
    if (w.region)   lines.push(`    <region>${escapeXml(w.region)}</region>`);
    if (w.grape)    lines.push(`    <grape>${escapeXml(w.grape)}</grape>`);
    if (w.vintage)  lines.push(`    <vintage>${escapeXml(w.vintage)}</vintage>`);
    if (w.date)     lines.push(`    <date>${escapeXml(w.date)}</date>`);
    if (w.event)    lines.push(`    <event>${escapeXml(w.event)}</event>`);
    if (w.colour)   lines.push(`    <colour>${escapeXml(w.colour)}</colour>`);
    if (w.style)    lines.push(`    <style>${escapeXml(w.style)}</style>`);
    if (w.rating)   lines.push(`    <rating>${Number(w.rating) || 0}</rating>`);
    if (w.rpScore)  lines.push(`    <rpScore>${Number(w.rpScore) || 0}</rpScore>`);
    if (w.starred)  lines.push(`    <starred>true</starred>`);
    if (w.eventRank) lines.push(`    <eventRank>${escapeXml(w.eventRank)}</eventRank>`);
    if (w.acid || w.tannin || w.body) {
      lines.push(`    <structure>`);
      if (w.acid)    lines.push(`      <acid>${escapeXml(w.acid)}</acid>`);
      if (w.tannin)  lines.push(`      <tannin>${escapeXml(w.tannin)}</tannin>`);
      if (w.body)    lines.push(`      <body>${escapeXml(w.body)}</body>`);
      lines.push(`    </structure>`);
    }
    if (w.appearance) lines.push(`    <appearance>${escapeXml(w.appearance)}</appearance>`);
    if (w.nose)       lines.push(`    <nose>${escapeXml(w.nose)}</nose>`);
    if (w.palate)     lines.push(`    <palate>${escapeXml(w.palate)}</palate>`);
    if (w.summary)    lines.push(`    <summary>${escapeXml(w.summary)}</summary>`);
    if (w.createdAt)  lines.push(`    <createdAt>${Number(w.createdAt) || 0}</createdAt>`);
    lines.push(`  </wine>`);
  }
  // Cellar bottles section
  if (state.cellar && state.cellar.length > 0) {
    lines.push('  <bottles count="' + state.cellar.length + '">');
    for (const b of state.cellar) {
      lines.push(`    <bottle id="${escapeXml(b.id || '')}">`);
      lines.push(`      <name>${escapeXml(b.name || '')}</name>`);
      if (b.producer) lines.push(`      <producer>${escapeXml(b.producer)}</producer>`);
      if (b.region)   lines.push(`      <region>${escapeXml(b.region)}</region>`);
      if (b.grape)    lines.push(`      <grape>${escapeXml(b.grape)}</grape>`);
      if (b.vintage)  lines.push(`      <vintage>${escapeXml(b.vintage)}</vintage>`);
      if (b.colour)   lines.push(`      <colour>${escapeXml(b.colour)}</colour>`);
      if (b.style)    lines.push(`      <style>${escapeXml(b.style)}</style>`);
      if (b.location) lines.push(`      <location>${escapeXml(b.location)}</location>`);
      if (b.quantity) lines.push(`      <quantity>${Number(b.quantity) || 1}</quantity>`);
      if (b.purchasePrice) lines.push(`      <purchasePrice>${escapeXml(b.purchasePrice)}</purchasePrice>`);
      if (b.purchaseDate) lines.push(`      <purchaseDate>${escapeXml(b.purchaseDate)}</purchaseDate>`);
      if (b.drinkFrom) lines.push(`      <drinkFrom>${escapeXml(b.drinkFrom)}</drinkFrom>`);
      if (b.drinkBy)  lines.push(`      <drinkBy>${escapeXml(b.drinkBy)}</drinkBy>`);
      if (b.notes)    lines.push(`      <notes>${escapeXml(b.notes)}</notes>`);
      if (b.photo)    lines.push(`      <photo>${escapeXml(b.photo)}</photo>`);
      if (b.addedAt)  lines.push(`      <addedAt>${Number(b.addedAt) || 0}</addedAt>`);
      lines.push('    </bottle>');
    }
    lines.push('  </bottles>');
  }
  // Include authored quizzes so backups are complete
  if ((state.myQuizzes || []).length > 0 || (state.pastQuizzes || []).length > 0) {
    lines.push('  <quizzes>');
    const all = [...(state.myQuizzes || []), ...(state.pastQuizzes || [])];
    const seen = new Set();
    all.forEach(q => {
      if (seen.has(q.id)) return;
      seen.add(q.id);
      const json = JSON.stringify(q);
      // CDATA-wrap so special chars don't break XML
      lines.push(`    <quiz id="${escapeXml(q.id)}"><![CDATA[${json}]]></quiz>`);
    });
    lines.push('  </quizzes>');
  }

  lines.push('</cellar>');
  return lines.join('\n');
}

function exportXML() {
  if (state.wines.length === 0) {
    showToast('Nothing to export yet');
    return;
  }
  const xml = buildXML(state.wines);
  const blob = new Blob([xml], { type: 'application/xml' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = `cellar-${todayISO()}.xml`;
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  setTimeout(() => URL.revokeObjectURL(url), 1000);
  showToast(`Exported ${state.wines.length} ${state.wines.length === 1 ? 'note' : 'notes'}`);
}

// ========== XML Import ==========
function textOf(el, tag) {
  if (!el) return '';
  const node = el.getElementsByTagName(tag)[0];
  return node ? (node.textContent || '').trim() : '';
}

function parseXML(xmlText) {
  const parser = new DOMParser();
  const doc = parser.parseFromString(xmlText, 'application/xml');
  if (doc.getElementsByTagName('parsererror').length > 0) {
    throw new Error('The file is not valid XML.');
  }
  const root = doc.documentElement;
  if (!root || root.tagName.toLowerCase() !== 'cellar') {
    throw new Error('Not a cellar export file.');
  }
  // Parse cellar bottles first (different tag name)
  const importedBottles = [];
  const bottlesContainer = root.getElementsByTagName('bottles')[0];
  if (bottlesContainer) {
    const bottleNodes = bottlesContainer.getElementsByTagName('bottle');
    for (let i = 0; i < bottleNodes.length; i++) {
      const b = bottleNodes[i];
      const qty = textOf(b, 'quantity');
      const addedTxt = textOf(b, 'addedAt');
      const bottle = {
        id: b.getAttribute('id') || uid(),
        name: textOf(b, 'name'),
        producer: textOf(b, 'producer'),
        region: textOf(b, 'region'),
        grape: textOf(b, 'grape'),
        vintage: textOf(b, 'vintage'),
        colour: textOf(b, 'colour'),
        style: textOf(b, 'style'),
        location: textOf(b, 'location'),
        quantity: qty ? Math.max(1, parseInt(qty, 10) || 1) : 1,
        purchasePrice: textOf(b, 'purchasePrice'),
        purchaseDate: textOf(b, 'purchaseDate'),
        drinkFrom: textOf(b, 'drinkFrom'),
        drinkBy: textOf(b, 'drinkBy'),
        notes: textOf(b, 'notes'),
        photo: textOf(b, 'photo'),
        addedAt: addedTxt ? (parseInt(addedTxt, 10) || Date.now()) : Date.now(),
      };
      if (bottle.name) importedBottles.push(bottle);
    }
  }
  // Store on result (attached later) via closure side-channel
  parseXML._lastBottles = importedBottles;

  const wineNodes = root.getElementsByTagName('wine');
  const imported = [];
  const N = 'n' + 'ame';
  for (let i = 0; i < wineNodes.length; i++) {
    const w = wineNodes[i];
    const id = w.getAttribute('id') || uid();
    const struct = w.getElementsByTagName('structure')[0];
    const starredTxt = textOf(w, 'starred').toLowerCase();
    const ratingTxt = textOf(w, 'rating');
    const rpTxt = textOf(w, 'rpScore');
    const createdTxt = textOf(w, 'createdAt');
    const wine = {
      id,
      name: textOf(w, N),
      producer: textOf(w, 'producer'),
      region: textOf(w, 'region'),
      grape: textOf(w, 'grape'),
      vintage: textOf(w, 'vintage'),
      date: textOf(w, 'date'),
      event: textOf(w, 'event'),
      colour: textOf(w, 'colour'),
      style: textOf(w, 'style'),
      rating: ratingTxt ? Math.max(0, Math.min(5, parseInt(ratingTxt, 10) || 0)) : 0,
      rpScore: rpTxt ? Math.max(0, Math.min(100, parseInt(rpTxt, 10) || 0)) : 0,
      starred: starredTxt === 'true' || starredTxt === '1',
      eventRank: textOf(w, 'eventRank'),
      acid: struct ? textOf(struct, 'acid') : '',
      tannin: struct ? textOf(struct, 'tannin') : '',
      body: struct ? textOf(struct, 'body') : '',
      appearance: textOf(w, 'appearance'),
      nose: textOf(w, 'nose'),
      palate: textOf(w, 'palate'),
      summary: textOf(w, 'summary'),
      createdAt: createdTxt ? (parseInt(createdTxt, 10) || Date.now()) : Date.now(),
    };
    if (!wine.name) continue;
    imported.push(wine);
  }
  // Parse quizzes if present
  const quizContainer = root.getElementsByTagName('quizzes')[0];
  const importedQuizzes = [];
  if (quizContainer) {
    const quizNodes = quizContainer.getElementsByTagName('quiz');
    for (let i = 0; i < quizNodes.length; i++) {
      try {
        const json = quizNodes[i].textContent || '';
        const q = JSON.parse(json);
        if (q && q.id) importedQuizzes.push(q);
      } catch (e) { /* skip invalid */ }
    }
  }
  // Stash quizzes on the imported array object for the caller to pick up
  imported._quizzes = importedQuizzes;
  return imported;
}

async function doImport(xmlText, mode) {
  let parsed;
  try { parsed = parseXML(xmlText); }
  catch (e) { showToast(e.message || 'Could not read file'); return; }
  const parsedBottles = parseXML._lastBottles || [];
  if (parsed.length === 0 && parsedBottles.length === 0) { showToast('Nothing found in the file'); return; }

  const importedQuizzes = parsed._quizzes || [];

  if (mode === 'replace') {
    state.wines = parsed;
    state.cellar = parsedBottles;
    // Replace quizzes too
    if (importedQuizzes.length > 0) {
      const myUid = state.quizUser && state.quizUser.id;
      state.myQuizzes = importedQuizzes.filter(q => q.masterId === myUid);
      state.pastQuizzes = importedQuizzes.filter(q => q.status === 'ended');
      await saveMyQuizzes(state.myQuizzes);
      await savePastQuizzes(state.pastQuizzes);
    }
    await persist();
    await persistCellar();
    render();
    const parts = [];
    if (parsed.length) parts.push(`${parsed.length} note${parsed.length === 1 ? '' : 's'}`);
    if (parsedBottles.length) parts.push(`${parsedBottles.length} bottle${parsedBottles.length === 1 ? '' : 's'}`);
    if (importedQuizzes.length) parts.push(`${importedQuizzes.length} quiz${importedQuizzes.length === 1 ? '' : 'zes'}`);
    showToast(`Replaced with ${parts.join(' + ')}`);
    return;
  }

  const existingIds = new Set(state.wines.map(w => w.id));
  let added = 0, skipped = 0;
  for (const w of parsed) {
    if (existingIds.has(w.id)) { skipped++; continue; }
    state.wines.push(w);
    existingIds.add(w.id);
    added++;
  }
  // Merge bottles
  const existingBottleIds = new Set(state.cellar.map(b => b.id));
  let bottlesAdded = 0;
  for (const b of parsedBottles) {
    if (existingBottleIds.has(b.id)) continue;
    state.cellar.push(b);
    existingBottleIds.add(b.id);
    bottlesAdded++;
  }

  // Merge quizzes by id
  let quizzesAdded = 0;
  if (importedQuizzes.length > 0) {
    const myIds = new Set(state.myQuizzes.map(q => q.id));
    const pastIds = new Set(state.pastQuizzes.map(q => q.id));
    const myUid = state.quizUser && state.quizUser.id;
    importedQuizzes.forEach(q => {
      if (q.status === 'ended') {
        if (!pastIds.has(q.id)) { state.pastQuizzes.push(q); pastIds.add(q.id); quizzesAdded++; }
      } else if (q.masterId === myUid) {
        if (!myIds.has(q.id)) { state.myQuizzes.push(q); myIds.add(q.id); quizzesAdded++; }
      }
    });
    if (quizzesAdded > 0) {
      await saveMyQuizzes(state.myQuizzes);
      await savePastQuizzes(state.pastQuizzes);
    }
  }

  await persist();
  if (bottlesAdded > 0) await persistCellar();
  render();
  const parts = [];
  if (added) parts.push(`${added} note${added === 1 ? '' : 's'}`);
  if (bottlesAdded) parts.push(`${bottlesAdded} bottle${bottlesAdded === 1 ? '' : 's'}`);
  if (quizzesAdded) parts.push(`${quizzesAdded} quiz${quizzesAdded === 1 ? '' : 'zes'}`);
  if (parts.length === 0) showToast('All already in cellar');
  else showToast(`Added ${parts.join(' + ')}`);
}

function triggerImport() {
  const fileInput = document.getElementById('fileInput');
  fileInput.value = '';
  fileInput.onchange = async (e) => {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    try {
      const text = await file.text();
      if (state.wines.length === 0) {
        await doImport(text, 'merge');
      } else {
        openActionSheet(
          `Import ${escapeHtml(file.name)}`,
          [
            { icon: iconPlus(),    title: 'Merge into cellar', desc: 'Add new wines, skip duplicates by ID',
              onClick: () => doImport(text, 'merge') },
            { icon: iconReplace(), title: 'Replace all',       desc: 'Discard current wines and import fresh',
              onClick: () => {
                confirmModal(
                  'Replace all wines?',
                  `Your current ${state.wines.length} ${state.wines.length === 1 ? 'note' : 'notes'} will be removed and replaced with the imported file.`,
                  'Replace',
                  () => doImport(text, 'replace')
                );
              } },
          ]
        );
      }
    } catch (err) {
      console.error(err);
      showToast('Could not read file');
    }
  };
  fileInput.click();
}

function iconDownload() { return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>`; }

// ========== Star toggle ==========
async function toggleStar(id) {
  const idx = state.wines.findIndex(w => w.id === id);
  if (idx < 0) return;
  state.wines[idx].starred = !state.wines[idx].starred;
  await persist();

  const cardBtn = document.querySelector(`.star-btn[data-star-id="${CSS.escape(id)}"]`);
  if (cardBtn) {
    const starred = state.wines[idx].starred;
    cardBtn.classList.toggle('starred', starred);
    cardBtn.innerHTML = starSVG(starred);
    cardBtn.setAttribute('aria-label', starred ? 'Unstar wine' : 'Star wine');
  }

  const detailBtn = document.getElementById('detailStar');
  if (detailBtn && state.currentId === id) {
    const starred = state.wines[idx].starred;
    detailBtn.classList.toggle('starred', starred);
    detailBtn.innerHTML = starSVG(starred);
  }

  if (state.view === 'list') {
    const panel = document.getElementById('statsPanel');
    if (panel) {
      const fresh = buildStatsPanelHTML();
      if (fresh) panel.outerHTML = fresh;
    }
    if (state.starredOnly && !state.wines[idx].starred) renderListResultsOnly();
  }
}

// ========== Navigation ==========
function navigate(view, id) {
  // Stop quiz polling when leaving quiz views entirely
  const isQuizView = view.startsWith('quiz-');
  const wasQuizView = state.view.startsWith('quiz-');
  if (wasQuizView && !isQuizView) {
    stopQuizPolling();
  }
  state.view = view;
  state.currentId = id || null;
  if (view === 'form') {
    if (id) {
      const wine = state.wines.find(w => w.id === id);
      state.editingId = id;
      state.formDraft = wine ? { ...blankWine(), ...wine } : blankWine();
    } else {
      state.editingId = null;
      if (!state.formDraft) state.formDraft = blankWine();
    }
  } else if (view === 'settings') {
    state.settingsDraft = {
      storageType: state.config.storageType || 'local',
      dropboxToken: state.config.dropboxToken || '',
    };
  } else if (view === 'picker') {
    // formDraft stays intact; user will return to form
  } else if (view === 'bottleForm') {
    if (id) {
      const bottle = state.cellar.find(b => b.id === id);
      state.bottleEditingId = id;
      state.bottleDraft = bottle ? { ...blankBottle(), ...bottle } : blankBottle();
    } else {
      state.bottleEditingId = null;
      if (!state.bottleDraft) state.bottleDraft = blankBottle();
    }
  } else if (view === 'bottleDetail') {
    state.currentBottleId = id;
  } else if (view === 'drinkBottle') {
    // id is the bottle id; formDraft holds the tasting note draft
    state.currentBottleId = id;
    const bottle = state.cellar.find(b => b.id === id);
    if (bottle && !state.formDraft) {
      const draft = blankWine();
      draft.name = bottle.name || '';
      draft.producer = bottle.producer || '';
      draft.region = bottle.region || '';
      draft.grape = bottle.grape || '';
      draft.vintage = bottle.vintage || '';
      draft.colour = bottle.colour || '';
      draft.style = bottle.style || '';
      state.formDraft = draft;
    }
  } else if (view !== 'bottleForm' && view !== 'bottleDetail' && view !== 'drinkBottle') {
    state.formDraft = null;
    state.editingId = null;
  }
  window.scrollTo(0, 0);
  render();
}

// ========== Photo capture ==========
// Read a file and resize to max 1400x1400, return a JPEG data URL
async function readAndResizePhoto(file, maxDim = 1400, quality = 0.82) {
  return new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.onerror = () => reject(new Error('Could not read file'));
    reader.onload = () => {
      const img = new Image();
      img.onerror = () => reject(new Error('Could not load image'));
      img.onload = () => {
        let { width, height } = img;
        if (width > maxDim || height > maxDim) {
          if (width > height) {
            height = Math.round(height * maxDim / width);
            width = maxDim;
          } else {
            width = Math.round(width * maxDim / height);
            height = maxDim;
          }
        }
        const canvas = document.createElement('canvas');
        canvas.width = width;
        canvas.height = height;
        const ctx = canvas.getContext('2d');
        ctx.drawImage(img, 0, 0, width, height);
        try {
          const dataUrl = canvas.toDataURL('image/jpeg', quality);
          resolve(dataUrl);
        } catch (e) {
          reject(e);
        }
      };
      img.src = reader.result;
    };
    reader.readAsDataURL(file);
  });
}

async function handlePhotoSelected(file) {
  if (!file) return;
  try {
    showToast('Processing photo…');
    const dataUrl = await readAndResizePhoto(file);
    if (!state.bottleDraft) state.bottleDraft = blankBottle();
    state.bottleDraft.photo = dataUrl;
    render();
    showToast('Photo attached');
  } catch (e) {
    console.error(e);
    showToast('Could not read photo');
  }
}

// ========== Cellar actions ==========
async function addOrUpdateBottle() {
  if (!state.bottleDraft || !state.bottleDraft.name) {
    showToast('Please enter a wine name');
    return;
  }
  const data = { ...state.bottleDraft };
  const existingIdx = state.cellar.findIndex(b => b.id === data.id);
  if (existingIdx >= 0) {
    data.addedAt = state.cellar[existingIdx].addedAt || data.addedAt;
    state.cellar[existingIdx] = data;
  } else {
    data.addedAt = Date.now();
    state.cellar.push(data);
  }
  await persistCellar();
  showToast(state.bottleEditingId ? 'Bottle updated' : 'Added to cellar');
  state.bottleDraft = null;
  state.bottleEditingId = null;
  navigate('bottleDetail', data.id);
}

async function removeBottle(bottleId) {
  const bottle = state.cellar.find(b => b.id === bottleId);
  if (!bottle) return;
  const name = bottle.name || 'this bottle';
  confirmModal(
    'Remove from cellar?',
    `"${name}" will be removed from your cellar. This does not affect any tasting notes.`,
    'Remove',
    async () => {
      state.cellar = state.cellar.filter(b => b.id !== bottleId);
      await persistCellar();
      showToast('Removed from cellar');
      navigate('cellar');
    }
  );
}

async function relocateBottle(bottleId) {
  const bottle = state.cellar.find(b => b.id === bottleId);
  if (!bottle) return;
  const locations = uniqueLocationsOfCellar();

  // Build sheet items
  const items = [];
  for (const loc of locations) {
    if (loc === bottle.location) continue;
    items.push({
      icon: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>`,
      title: loc,
      desc: 'Existing location',
      onClick: async () => {
        const idx = state.cellar.findIndex(b => b.id === bottleId);
        if (idx < 0) return;
        state.cellar[idx].location = loc;
        await persistCellar();
        showToast(`Moved to ${loc}`);
        render();
      },
    });
  }
  items.push({
    icon: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>`,
    title: 'New location…',
    desc: 'Type a location name',
    onClick: () => {
      // Inline prompt via a simple modal — reuse confirmModal flow pattern
      const newLoc = (window.prompt('Move this bottle to:', bottle.location || '') || '').trim();
      if (!newLoc) return;
      const idx = state.cellar.findIndex(b => b.id === bottleId);
      if (idx < 0) return;
      state.cellar[idx].location = newLoc;
      persistCellar().then(() => {
        showToast(`Moved to ${newLoc}`);
        render();
      });
    },
  });
  openActionSheet(`Currently in ${bottle.location ? escapeHtml(bottle.location) : '<em>no location</em>'}`, items);
}

async function saveDrinkNote(bottleId, draftOverrides) {
  const bottleIdx = state.cellar.findIndex(b => b.id === bottleId);
  if (bottleIdx < 0) return;
  const bottle = state.cellar[bottleIdx];
  const draft = state.formDraft || blankWine();

  // Merge overrides (from form)
  const rpRaw = (draftOverrides.rpScore || '').toString().trim();
  let rp = 0;
  if (rpRaw) {
    rp = parseInt(rpRaw, 10);
    if (isNaN(rp) || rp < 50 || rp > 100) rp = 0;
  }
  const wine = {
    ...blankWine(),
    ...draft,
    name: bottle.name || draft.name || 'Untitled',
    producer: bottle.producer || draft.producer || '',
    region: bottle.region || draft.region || '',
    grape: bottle.grape || draft.grape || '',
    vintage: bottle.vintage || draft.vintage || '',
    colour: bottle.colour || draft.colour || '',
    style: bottle.style || draft.style || '',
    date: (draftOverrides.date || '').trim() || todayISO(),
    event: (draftOverrides.event || '').toString().trim(),
    rating: draft.rating || 0,
    rpScore: rp,
    appearance: (draftOverrides.appearance || '').toString().trim(),
    nose: (draftOverrides.nose || '').toString().trim(),
    palate: (draftOverrides.palate || '').toString().trim(),
    summary: (draftOverrides.summary || '').toString().trim(),
    createdAt: Date.now(),
  };
  // Save note
  state.wines.push(wine);
  // Decrement cellar
  const qty = Math.max(1, Number(bottle.quantity) || 1);
  if (qty > 1) {
    state.cellar[bottleIdx].quantity = qty - 1;
  } else {
    state.cellar.splice(bottleIdx, 1);
  }
  await persist();
  await persistCellar();
  state.formDraft = null;
  state.currentBottleId = null;
  showToast('Tasting note saved');
  navigate('detail', wine.id);
}

// Extend datalists function to include cellar values
function uniqueLocationsOfCellar() {
  const set = new Set();
  state.cellar.forEach(b => {
    const v = ((b.location || '') + '').trim();
    if (v) set.add(v);
  });
  return [...set].sort((a, b) => a.localeCompare(b));
}

// Cellar stats
function computeCellarStats() {
  const bottles = state.cellar;
  const totalBottles = bottles.reduce((s, b) => s + (Number(b.quantity) || 1), 0);
  const uniqueWines = bottles.length;

  // Total value (sum of quantity * purchasePrice)
  let totalValue = 0;
  let valueCurrency = '';
  let pricedBottles = 0;
  for (const b of bottles) {
    const pStr = (b.purchasePrice || '').trim();
    if (!pStr) continue;
    // Extract numeric portion
    const match = pStr.match(/([€$£¥₹]?)\s*([\d.,]+)/);
    if (match) {
      const num = parseFloat(match[2].replace(/,/g, match[2].includes(',') && !match[2].includes('.') ? '.' : ''));
      if (!isNaN(num)) {
        totalValue += num * (Number(b.quantity) || 1);
        pricedBottles++;
        if (!valueCurrency && match[1]) valueCurrency = match[1];
      }
    }
  }

  // Ready to drink today
  const today = todayISO();
  let readyCount = 0;
  for (const b of bottles) {
    const from = b.drinkFrom || '';
    const by = b.drinkBy || '';
    const inWindow = (!from || from <= today) && (!by || today <= by);
    if (inWindow) readyCount += (Number(b.quantity) || 1);
  }

  // Oldest vintage
  let oldestVintage = null;
  for (const b of bottles) {
    const v = parseInt((b.vintage || '').trim(), 10);
    if (!isNaN(v) && v > 1800 && v < 2100) {
      if (oldestVintage === null || v < oldestVintage) oldestVintage = v;
    }
  }

  // By location
  const byLocation = {};
  for (const b of bottles) {
    const loc = (b.location || 'Unassigned').trim() || 'Unassigned';
    byLocation[loc] = (byLocation[loc] || 0) + (Number(b.quantity) || 1);
  }
  const locationEntries = Object.entries(byLocation).sort((a, b) => b[1] - a[1]);

  // By colour
  const byColour = {};
  for (const b of bottles) {
    if (b.colour) byColour[b.colour] = (byColour[b.colour] || 0) + (Number(b.quantity) || 1);
  }
  const colourEntries = Object.entries(byColour).sort((a, b) => b[1] - a[1]);
  const colouredCount = colourEntries.reduce((s, [, c]) => s + c, 0);

  return {
    totalBottles, uniqueWines, totalValue, valueCurrency, pricedBottles,
    readyCount, oldestVintage, locationEntries, colourEntries, colouredCount,
  };
}

// ========== Render: Stats Panel ==========
function buildStatsPanelHTML() {
  if (state.wines.length === 0) return '';
  const s = computeStats(state.wines);
  const hasColours = s.colourEntries.length > 0;

  const bar = hasColours ? `
    <div class="colour-bar">
      ${s.colourEntries.map(([name, count]) => {
        const pct = (count / s.colouredCount) * 100;
        return `<div class="colour-seg" style="width:${pct}%;background:${COLOUR_HEX[name] || 'var(--wine)'}"></div>`;
      }).join('')}
    </div>
  ` : '';

  const legend = hasColours ? `
    <div class="colour-legend">
      ${s.colourEntries.map(([name, count]) => `
        <span class="colour-legend-item">
          <span class="legend-dot" style="background:${COLOUR_HEX[name] || 'var(--wine)'}"></span>
          ${escapeHtml(name)} <span class="legend-count">${count}</span>
        </span>
      `).join('')}
    </div>
  ` : '';

  return `
    <div class="stats-panel" id="statsPanel">
      <div class="stats-label">At a glance</div>
      <div class="stat-tiles">
        <div class="stat-tile">
          <div class="stat-number">${s.total}</div>
          <div class="stat-label-small">bottles</div>
        </div>
        <div class="stat-tile">
          <div class="stat-number">${s.starred}<span class="stat-star">★</span></div>
          <div class="stat-label-small">starred</div>
        </div>
        <div class="stat-tile">
          <div class="stat-number">${s.avgRating > 0 ? s.avgRating.toFixed(1) : '—'}<span class="unit">${s.avgRating > 0 ? '/5' : ''}</span></div>
          <div class="stat-label-small">avg rating</div>
        </div>
        <div class="stat-tile">
          <div class="stat-number">${s.yearCount}</div>
          <div class="stat-label-small">this year</div>
        </div>
      </div>
      ${hasColours ? `
        <div class="colour-section">
          <div class="colour-section-label">By colour</div>
          ${bar}
          ${legend}
        </div>
      ` : ''}
    </div>
  `;
}

// ========== Render: Card ==========
function renderCard(w, q) {
  const rating = Math.max(0, Math.min(5, w.rating || 0));
  const dots = Array.from({ length: 5 }, (_, i) =>
    `<span class="rating-dot${i < rating ? ' filled' : ''}"></span>`
  ).join('');

  const previewText = w.summary || w.palate || w.nose || w.appearance || '';
  const previewLabelText = w.summary ? 'Summary'
    : w.palate ? 'Palate'
    : w.nose ? 'Nose'
    : w.appearance ? 'Appearance'
    : '';

  const starred = !!w.starred;
  const rp = Number(w.rpScore) || 0;

  return `
    <div class="wine-card" data-id="${w.id}" data-colour="${escapeHtml(w.colour || '')}" role="button" tabindex="0">
      <button class="star-btn ${starred ? 'starred' : ''}" data-star-id="${w.id}" aria-label="${starred ? 'Unstar wine' : 'Star wine'}" type="button">
        ${starSVG(starred)}
      </button>
      <div class="card-head">
        <div class="wine-title">${highlight(w.name || 'Untitled', q)}</div>
        ${w.vintage ? `<div class="wine-vintage">${highlight(w.vintage, q)}</div>` : ''}
      </div>
      ${w.producer ? `<div class="wine-subtitle">${highlight(w.producer, q)}</div>` : ''}
      <div class="card-meta">
        ${w.date ? `<span class="card-date">${formatDate(w.date)}</span>` : ''}
        ${w.event ? `<span class="dot"></span><span class="card-event">${highlight(w.event, q)}</span>` : ''}
        ${rating > 0 ? `<span class="dot"></span><span class="rating">${dots}</span>` : ''}
        ${rp >= 50 ? `<span class="dot"></span><span class="rp-badge"><span class="rp-badge-label">RP</span>${rp}</span>` : ''}
        ${w.eventRank ? `<span class="dot"></span><span class="event-rank-badge" data-rank="${escapeHtml(w.eventRank)}" title="Event rank">${escapeHtml(w.eventRank)}</span>` : ''}
      </div>
      ${previewText ? `
        <div class="card-preview">
          <span class="card-preview-label">${previewLabelText}.</span>
          ${highlight(previewText, q)}
        </div>
      ` : ''}
    </div>
  `;
}

// ========== Render: List ==========
function renderList() {
  const hasAnyWines = state.wines.length > 0;
  const wines = filteredWines();
  const q = state.searchQuery.trim();

  if (!hasAnyWines) {
    return `
      ${renderHeader()}
      ${renderTastingsButton()}
      ${renderQuizHomeButton()}
      ${renderTravelButton()}
      ${renderChampagneButton()}
      ${renderLibraryButton()}
      ${renderQrButton()}
      <div class="list-view">
        <div class="empty">
          <div class="empty-glyph">⁓</div>
          <div class="empty-title">Your cellar awaits</div>
          <div class="empty-text">Tap the button below to record your first tasting note, or use the menu to import a backup.</div>
        </div>
      </div>
      ${renderFab()}
    `;
  }

  let body;
  if (wines.length === 0) {
    const why = state.starredOnly && !q
      ? 'No starred wines yet. Tap the star on any wine to mark it.'
      : state.starredOnly && q
      ? `Nothing starred matching "${escapeHtml(q)}".`
      : `Nothing found for "${escapeHtml(q)}". Try a different term.`;
    body = `<div class="no-results"><div class="empty-title">No matches</div><div class="empty-text">${why}</div></div>`;
  } else {
    body = wines.map(w => renderCard(w, q)).join('');
  }

  return `
    ${renderHeader()}
    ${buildStatsPanelHTML()}
    ${renderTastingsButton()}
    ${renderQuizHomeButton()}
    ${renderTravelButton()}
    ${renderChampagneButton()}
    ${renderLibraryButton()}
    ${renderQrButton()}
    ${renderSearch()}
    <div class="list-view">${body}</div>
    ${renderFab()}
  `;
}

function renderTastingsSection() {
  const tastings = computeTastings(state.wines);
  if (tastings.length === 0) return '';

  const MAX_VISIBLE = 5;
  const visible = tastings.slice(0, MAX_VISIBLE);
  const hiddenCount = tastings.length - visible.length;

  const rows = visible.map(t => {
    const count = t.wines.length;
    const dateStr = t.dates.length
      ? (t.dates[0] === t.dates[t.dates.length - 1]
          ? formatDate(t.dates[0])
          : `${formatDate(t.dates[0])} — ${formatDate(t.dates[t.dates.length - 1])}`)
      : '';
    const rankedCount = t.wines.filter(w => w.eventRank).length;
    const metaParts = [dateStr, rankedCount > 0 ? `${rankedCount} ranked` : ''].filter(Boolean);
    const meta = metaParts.join(' · ');

    const colourDots = [...t.colours].slice(0, 4).map(c =>
      `<span class="tasting-colour-dot" style="background:${colourCssVar(c)}"></span>`
    ).join('');

    return `
      <button class="tasting-row" data-tasting-event="${escapeHtml(t.name)}" type="button">
        <span class="tasting-num">
          ${count}
          <span class="tasting-num-unit">wine${count === 1 ? '' : 's'}</span>
        </span>
        <span class="tasting-info">
          <span class="tasting-name">${escapeHtml(t.name)}</span>
          ${meta ? `<span class="tasting-meta">${escapeHtml(meta)}</span>` : ''}
        </span>
        ${colourDots ? `<span class="tasting-colours">${colourDots}</span>` : ''}
        <span class="tasting-arrow">›</span>
      </button>
    `;
  }).join('');

  return `
    <div class="tastings-section">
      <div class="tastings-header">
        <span class="tastings-label">Tastings</span>
        <span class="tastings-count">${tastings.length} event${tastings.length === 1 ? '' : 's'}</span>
      </div>
      <div class="tastings-list">${rows}</div>
      ${hiddenCount > 0 ? `<div class="tastings-more">+ ${hiddenCount} more event${hiddenCount === 1 ? '' : 's'} — search or tap an event chip on a wine</div>` : ''}
    </div>
  `;
}

function renderTastingsButton() {
  const tastings = computeTastings(state.wines);
  const totalWines = tastings.reduce((n, t) => n + t.wines.length, 0);
  const desc = tastings.length === 0
    ? 'Add an event to a wine to group tastings here'
    : `${tastings.length} event${tastings.length === 1 ? '' : 's'} · ${totalWines} wine${totalWines === 1 ? '' : 's'} poured`;
  return `
    <button class="library-btn" id="tastingsBtn" type="button" aria-label="Open tastings">
      <span class="library-icon" style="background:rgba(107, 26, 44, 0.08);color:var(--wine);">

}

// ========== Render: Detail ==========
function renderStructureItem(name, value) {
  const idx = SCALE_VALUES.indexOf(value);
  const pips = SCALE_VALUES.map((_, i) =>
    `<span class="struct-pip${i === idx ? ' on' : ''}"></span>`
  ).join('');
  const desc = idx >= 0 ? SCALE[idx].desc : '—';
  return `
    <div class="struct-item">
      <div class="struct-name">${name}</div>
      <div class="struct-scale">${pips}</div>
      <div class="struct-value${idx < 0 ? ' empty' : ''}">${desc}</div>
    </div>
  `;
}

function colourCssVar(colour) {
  return colour && COLOUR_HEX[colour] ? COLOUR_HEX[colour] : 'var(--wine)';
}

function renderDetail() {
  const wine = state.wines.find(w => w.id === state.currentId);
  if (!wine) {
    return `<div class="detail-view"><button class="back-btn" id="backBtn">← Back</button><p style="color:var(--muted);padding:20px 0">Note not found.</p></div>`;
  }

  const rating = Math.max(0, Math.min(5, wine.rating || 0));
  const dots = Array.from({ length: 5 }, (_, i) =>
    `<span class="rating-dot${i < rating ? ' filled' : ''}"></span>`
  ).join('');

  const starred = !!wine.starred;
  const rp = Number(wine.rpScore) || 0;

  const chips = [];
  if (wine.colour) chips.push(`<span class="chip chip-colour"><span class="chip-swatch" style="background:${colourCssVar(wine.colour)}"></span>${escapeHtml(wine.colour)}</span>`);
  if (wine.style)  chips.push(`<span class="chip">${escapeHtml(wine.style)}</span>`);
  if (wine.region) chips.push(`<span class="chip">${escapeHtml(wine.region)}</span>`);
  if (wine.grape)  chips.push(`<span class="chip">${escapeHtml(wine.grape)}</span>`);
  if (wine.event)  chips.push(`<button class="chip chip-event chip-link" id="eventChip" data-event-name="${escapeHtml(wine.event)}" type="button">${escapeHtml(wine.event)}</button>`);

  const hasStructure = wine.acid || wine.tannin || wine.body;

  return `
    <div class="detail-view">
      <div class="detail-top">
        <button class="back-btn" id="backBtn">← Home</button>
        <button class="detail-star ${starred ? 'starred' : ''}" id="detailStar" aria-label="${starred ? 'Unstar wine' : 'Star wine'}" data-star-id="${wine.id}">
          ${starSVG(starred)}
        </button>
      </div>

      <div class="detail-header">
        ${wine.vintage ? `<div class="detail-vintage">${escapeHtml(wine.vintage)}</div>` : ''}
        <h1 class="detail-title">${escapeHtml(wine.name || 'Untitled')}</h1>
        ${wine.producer ? `<div class="detail-subtitle">${escapeHtml(wine.producer)}</div>` : ''}
        <div class="detail-meta">
          <span>${formatDate(wine.date)}</span>
          ${rating > 0 ? `<span>·</span><span class="rating">${dots}</span>` : ''}
          ${rp >= 50 ? `<span>·</span><span class="rp-badge"><span class="rp-badge-label">RP</span>${rp}</span>` : ''}
          ${wine.eventRank ? `<span>·</span><span class="event-rank-badge" data-rank="${escapeHtml(wine.eventRank)}">${escapeHtml(wine.eventRank)}</span>` : ''}
        </div>
        ${chips.length ? `<div class="detail-chips">${chips.join('')}</div>` : ''}
      </div>

      <div class="section">
        <div class="section-label">Appearance</div>
        <div class="section-body">${escapeHtml(wine.appearance)}</div>
      </div>

      <div class="section">
        <div class="section-label">Nose</div>
        <div class="section-body">${escapeHtml(wine.nose)}</div>
      </div>

      ${hasStructure ? `
        <div class="section">
          <div class="section-label">Structure</div>
          <div class="structure">
            ${renderStructureItem('Acid', wine.acid)}
            ${renderStructureItem('Tannin', wine.tannin)}
            ${renderStructureItem('Body', wine.body)}
          </div>
        </div>
      ` : ''}

      <div class="section">
        <div class="section-label">Palate</div>
        <div class="section-body">${escapeHtml(wine.palate)}</div>
      </div>

      <div class="section">
        <div class="section-label">Summary</div>
        <div class="section-body">${escapeHtml(wine.summary)}</div>
      </div>

      ${(wine.event || wine.producer || wine.region || wine.grape) ? `
        <button class="add-another" id="addAnotherBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Add another from ${wine.event ? `<em>${escapeHtml(wine.event)}</em>` : '<em>same producer</em>'}
        </button>
      ` : ''}

      <div class="detail-actions">
        <button class="btn btn-delete" id="deleteBtn">Delete</button>
        <button class="btn btn-edit" id="editBtn">Edit note</button>
      </div>
    </div>
  `;
}

// ========== Render: Cellar ==========
function renderCellar() {
  const stats = computeCellarStats();
  const hasBottles = state.cellar.length > 0;
  const q = (state.cellarSearch || '').trim().toLowerCase();
  const locFilter = state.cellarLocationFilter || '';

  let visible = [...state.cellar].sort((a, b) => (b.addedAt || 0) - (a.addedAt || 0));
  if (locFilter) visible = visible.filter(b => (b.location || '') === locFilter);
  if (q) {
    visible = visible.filter(b => {
      const hay = [b.name, b.producer, b.region, b.grape, b.vintage, b.location, b.notes]
        .map(v => (v || '').toString().toLowerCase()).join(' ');
      return hay.includes(q);
    });
  }

  if (!hasBottles) {
    return `
      <div class="cellar-view">
        <div class="cellar-header">
          <div class="cellar-header-top">
            <h1 class="cellar-title">My <em>cellar</em></h1>
          </div>
        </div>
        <div class="empty">
          <div class="empty-glyph">⁓</div>
          <div class="empty-title">Your cellar is empty</div>
          <div class="empty-text">Tap the button below to add your first bottle. You can take a photo of the label and note where you're storing it.</div>
        </div>
        <button class="fab" id="fabAddBottle" aria-label="Add bottle">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <line x1="12" y1="5" x2="12" y2="19"/>
            <line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
        </button>
      </div>
    `;
  }

  // Stats panel
  const curSym = stats.valueCurrency || '';
  const valueDisplay = stats.totalValue > 0
    ? `${curSym}${stats.totalValue.toLocaleString(undefined, { maximumFractionDigits: 0 })}`
    : '—';

  // Build location filter chips
  const allChip = `<button class="cellar-filter-chip ${!locFilter ? 'active' : ''}" data-loc-filter="" type="button">All · ${stats.totalBottles}</button>`;
  const locChips = stats.locationEntries.map(([loc, count]) =>
    `<button class="cellar-filter-chip ${locFilter === loc ? 'active' : ''}" data-loc-filter="${escapeHtml(loc)}" type="button">${escapeHtml(loc)} · ${count}</button>`
  ).join('');

  // Build the list
  let listBody;
  if (visible.length === 0) {
    listBody = `<div class="no-results"><div class="empty-title">No bottles</div><div class="empty-text">${q ? `Nothing matches "${escapeHtml(q)}".` : 'No bottles in that location.'}</div></div>`;
  } else {
    listBody = visible.map(b => renderBottleCard(b, q)).join('');
  }

  return `
    <div class="cellar-view">
      <div class="cellar-header">
        <div class="cellar-header-top">
          <h1 class="cellar-title">My <em>cellar</em></h1>
        </div>
      </div>

      <div class="cellar-stats-panel">
        <div class="cellar-stats-grid">
          <div class="stat-tile">
            <div class="stat-number">${stats.totalBottles}</div>
            <div class="stat-label-small">bottles</div>
          </div>
          <div class="stat-tile">
            <div class="stat-number">${stats.readyCount}</div>
            <div class="stat-label-small">drink now</div>
          </div>
          <div class="stat-tile">
            <div class="stat-number" style="font-size:${stats.totalValue > 99999 ? '18px' : '22px'}">${valueDisplay}</div>
            <div class="stat-label-small">est. value</div>
          </div>
        </div>
        ${stats.colourEntries.length > 0 ? `
          <div class="colour-bar" style="margin-bottom:0">
            ${stats.colourEntries.map(([n, c]) => {
              const pct = (c / stats.colouredCount) * 100;
              return `<div class="colour-seg" style="width:${pct}%;background:${COLOUR_HEX[n] || 'var(--wine)'}" title="${escapeHtml(n)}: ${c}"></div>`;
            }).join('')}
          </div>
        ` : ''}
      </div>

      <div class="search-wrap">
        <div class="search-box">
          <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="11" cy="11" r="7"/>
            <line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <input type="text" class="search-input" id="cellarSearchInput" placeholder="Search your cellar…"
            value="${escapeHtml(state.cellarSearch)}" autocomplete="off" autocorrect="off" spellcheck="false">
          <button class="search-clear ${q ? 'visible' : ''}" id="cellarSearchClear" type="button" aria-label="Clear">×</button>
        </div>
      </div>

      <div class="cellar-filter-chips">
        ${allChip}${locChips}
      </div>

// ========== Render: Drink bottle (compact tasting note form) ==========
function renderDrinkBottle() {
  const bottle = state.cellar.find(b => b.id === state.currentBottleId);
  if (!bottle) {
    return `<div class="drink-form"><button class="back-btn" id="backBtn">← Back</button><p style="color:var(--muted);padding:20px 0">Bottle not found.</p></div>`;
  }
  const qty = Math.max(1, Number(bottle.quantity) || 1);
  const w = state.formDraft || blankWine();
  const rating = w.rating || 0;
  const rp = w.rpScore || '';

  const ratingBtns = [1, 2, 3, 4, 5].map(n =>
    `<button type="button" class="rating-btn${n <= rating ? ' active' : ''}" data-rating="${n}">${n}</button>`
  ).join('');

  return `
    <div class="drink-form">
      <button class="back-btn" id="backBtn">← Cancel</button>
      <h1 class="form-title">Drink a <em>bottle</em></h1>

      <div style="padding:12px 14px;background:var(--cream-warm);border-radius:10px;margin-bottom:20px;font-size:13px;color:var(--ink-soft);line-height:1.5;">
        <strong style="color:var(--wine-deep);font-family:'Fraunces',serif">${escapeHtml(bottle.name || 'Untitled')}${bottle.vintage ? ' ' + escapeHtml(bottle.vintage) : ''}</strong>
        ${bottle.producer ? `<div style="font-style:italic;font-family:'Fraunces',serif;margin-top:2px">${escapeHtml(bottle.producer)}</div>` : ''}
        <div style="font-family:'Fraunces',serif;font-style:italic;margin-top:6px;font-size:12px;color:var(--muted)">
          ${qty} bottle${qty === 1 ? '' : 's'} left${bottle.location ? ` · stored in ${escapeHtml(bottle.location)}` : ''}
        </div>
      </div>

      <form id="drinkFormEl" autocomplete="off">
        <div class="field">
          <label class="field-label" for="df-date">Tasted on</label>
          <input class="input" type="date" id="df-date" name="date" value="${escapeHtml(w.date || todayISO())}">
        </div>

        <div class="field">
          <label class="field-label" for="df-event">Event / occasion</label>
          <input class="input" type="text" id="df-event" name="event" value="${escapeHtml(w.event || '')}" placeholder="Anniversary dinner, Tuesday night…">
        </div>

        <div class="field-rating-row">
          <div class="field">
            <label class="field-label">Rating</label>
            <div class="rating-input" id="ratingInput">${ratingBtns}</div>
          </div>
          <div class="field">
            <label class="field-label" for="df-rp">RP Score</label>
            <input class="input rp" type="number" id="df-rp" name="rpScore" value="${rp}" placeholder="95" min="50" max="100" inputmode="numeric">
          </div>
        </div>

        <div class="field">
          <label class="field-label" for="df-appearance">Appearance</label>
          <textarea class="textarea" id="df-appearance" name="appearance" placeholder="Colour, clarity, viscosity…">${escapeHtml(w.appearance || '')}</textarea>
        </div>

        <div class="field">
          <label class="field-label" for="df-nose">Nose</label>
          <textarea class="textarea" id="df-nose" name="nose" placeholder="Aromas…">${escapeHtml(w.nose || '')}</textarea>
        </div>

        <div class="field">
          <label class="field-label" for="df-palate">Palate</label>
          <textarea class="textarea tall" id="df-palate" name="palate" placeholder="Flavours, structure, finish…">${escapeHtml(w.palate || '')}</textarea>
        </div>

        <div class="field">
          <label class="field-label" for="df-summary">Summary</label>
          <textarea class="textarea" id="df-summary" name="summary" placeholder="Overall impression, drinking window…">${escapeHtml(w.summary || '')}</textarea>

// ========== Render: QR ==========
function renderQrView() {
  const url = qrCurrentUrl();
  const svg = url ? qrRenderSVG(url, 480) : '';
  const isCustom = !!state.qrCustomUrl;
  const draft = state.qrEditDraft !== undefined ? state.qrEditDraft : state.qrCustomUrl;

  return `
    <div class="qr-view">
      <button class="back-btn" id="backBtn">← Home</button>
      <h1 class="grapes-title" style="padding:10px 0 6px;">Share <em>via QR</em></h1>

      <div class="qr-hero">
        <div class="qr-display">${svg || '<span style="color:var(--muted);font-family:Fraunces,serif;font-style:italic">Cannot generate QR — check your internet connection</span>'}</div>
        <div class="qr-brand">Mikael's Vin</div>
        <div class="qr-url-display">${escapeHtml(url || 'No URL detected')}</div>

        <div class="qr-instructions">
          Hold your phone camera up to this screen, or tap your own phone's camera app and point it at this QR code.
        </div>

        <div class="qr-actions">
          <button class="qr-action-pill" id="qrCopyBtn" type="button">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            Copy link
          </button>
          ${navigator.share ? `
            <button class="qr-action-pill" id="qrShareBtn" type="button">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="18" cy="5" r="3"/><circle cx="6" cy="12" r="3"/><circle cx="18" cy="19" r="3"/><line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/><line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/></svg>
              Share…
            </button>
          ` : ''}
        </div>
      </div>

      <div class="qr-override-box">
        <div class="qr-override-label">${isCustom ? 'Custom URL (overrides auto-detect)' : 'Override URL'}</div>
        <div class="qr-override-sub">${isCustom ? 'Clear to go back to auto-detected URL.' : 'Leave blank to use the page\'s current URL. Useful if you want the QR to always point to a specific host (e.g. your Netlify URL) even when you open this file locally.'}</div>
        <div class="qr-override-row">
          <input class="input" type="text" id="qrUrlInput" value="${escapeHtml(draft)}" placeholder="https://your-wine-app.netlify.app/" autocomplete="off" autocorrect="off" spellcheck="false" inputmode="url">

        </div>
        ${isCustom ? '<button class="btn-small danger" id="qrClearUrlBtn" type="button" style="margin-top:10px;width:100%;">Clear override</button>' : ''}
      </div>
    </div>
  `;
}

// ========== Render: Tastings Page ==========
function renderTastingsView() {
  const tastings = computeTastings(state.wines);

  if (tastings.length === 0) {
    return `
      <div class="grapes-view">
        <button class="back-btn" id="backBtn">← Home</button>
        <div class="grapes-header">
          <h1 class="grapes-title"><em>Tastings</em></h1>
          <div class="grapes-sub">No tastings yet. When you add an event to a wine, it'll appear here.</div>
        </div>
      </div>
    `;
  }

  const rows = tastings.map(t => {
    const count = t.wines.length;
    const dateStr = t.dates.length
      ? (t.dates[0] === t.dates[t.dates.length - 1]
          ? formatDate(t.dates[0])
          : `${formatDate(t.dates[0])} — ${formatDate(t.dates[t.dates.length - 1])}`)
      : '';
    const rankedCount = t.wines.filter(w => w.eventRank).length;
    const metaParts = [dateStr, rankedCount > 0 ? `${rankedCount} ranked` : ''].filter(Boolean);
    const meta = metaParts.join(' · ');

    const colourDots = [...t.colours].slice(0, 4).map(c =>
      `<span class="tasting-colour-dot" style="background:${colourCssVar(c)}"></span>`
    ).join('');

    return `
      <button class="tasting-row" data-tasting-event="${escapeHtml(t.name)}" type="button">
        <span class="tasting-num">
          ${count}
          <span class="tasting-num-unit">wine${count === 1 ? '' : 's'}</span>
        </span>
        <span class="tasting-info">
          <span class="tasting-name">${escapeHtml(t.name)}</span>
          ${meta ? `<span class="tasting-meta">${escapeHtml(meta)}</span>` : ''}
        </span>
        ${colourDots ? `<span class="tasting-colours">${colourDots}</span>` : ''}
        <span class="tasting-arrow">›</span>
      </button>
    `;
  }).join('');

  const totalWines = tastings.reduce((n, t) => n + t.wines.length, 0);

  return `
    <div class="grapes-view">
      <button class="back-btn" id="backBtn">← Home</button>
      <div class="grapes-header">
        <h1 class="grapes-title"><em>Tastings</em></h1>
        <div class="grapes-sub">${tastings.length} event${tastings.length === 1 ? '' : 's'} across ${totalWines} wine${totalWines === 1 ? '' : 's'}. Tap any event to rank its wines and see the full list.</div>
      </div>

      <div class="tastings-list" style="margin-top:16px;">
        ${rows}
      </div>
    </div>
  `;
}

function renderQuizPlay() {
  const q = state.activeQuiz;
  if (!q) return `<div class="quiz-view"><button class="back-btn" id="backBtn">← Back</button></div>`;

  const isMaster = state.quizRole === 'master';
  const qIdx = q.currentQuestion;
  const question = q.questions[qIdx];
  if (!question) return `<div class="quiz-view"><button class="back-btn" id="backBtn">← Back</button></div>`;

  const progress = ((qIdx + 1) / q.questions.length) * 100;
  const isLast = qIdx === q.questions.length - 1;

  const answersForQ = q.answers[qIdx] || {};
  const myUserId = state.quizUser ? state.quizUser.id : '';
  const myAnswer = answersForQ[myUserId];
  const hasSubmitted = state.quizMySubmitted || (myAnswer !== undefined);

  // Show correct answer reveal: for master when >50% have answered OR all have answered
  const answerCount = Object.keys(answersForQ).length;
  const participantCount = q.participants.length;
  const revealCorrect = isMaster; // master always sees correct answer

  const options = question.options.map((opt, oIdx) => {
    let cls = 'quiz-answer-option';
    if (isMaster) {
      if (oIdx === question.correctIndex) cls += ' reveal-correct';
    } else if (hasSubmitted) {
      if (oIdx === myAnswer && myAnswer === question.correctIndex) cls += ' correct';
      else if (oIdx === myAnswer) cls += ' wrong';
      else if (oIdx === question.correctIndex) cls += ' reveal-correct';
    } else if (state.quizMySelection === oIdx) {
      cls += ' selected';
    }
    return `
      <button class="${cls}" data-answer-opt="${oIdx}" type="button" ${isMaster || hasSubmitted ? 'disabled' : ''}>
        ${escapeHtml(opt)}
      </button>
    `;
  }).join('');

  let bottom = '';
  if (isMaster) {
    bottom = `
      <div class="quiz-status">${answerCount} of ${participantCount} answered</div>
      <div class="quiz-master-controls">
        <button class="btn btn-secondary" id="endQuizBtn" type="button">End quiz</button>
        <button class="btn btn-primary" id="nextQuestionBtn" type="button">
          ${isLast ? 'Show final results' : 'Next question'}
        </button>
      </div>
      ${participantCount > 0 ? `
        <div class="quiz-participants-list">
          <div class="quiz-participants-label">Participants</div>
          ${q.participants.map(p => {
            const ans = answersForQ[p.id];
            return `
              <div class="quiz-participant-row">
                <div class="quiz-participant-name">${escapeHtml(p.name)}${p.id === q.masterId ? ' <span style="color:var(--gold);font-size:11px;font-style:italic;">(host)</span>' : ''}</div>
                <div class="quiz-participant-status${ans !== undefined ? ' answered' : ''}">${ans !== undefined ? 'Answered' : 'Thinking…'}</div>
              </div>
            `;
          }).join('')}
        </div>
      ` : ''}
    `;
  } else if (hasSubmitted) {
    const wasRight = myAnswer === question.correctIndex;
    bottom = `<div class="quiz-status">${wasRight ? '✓ Correct' : '✗ Not quite'} — waiting for the next question…</div>`;
  } else {
    bottom = `
      <div class="form-actions">
        <button class="btn btn-primary" id="submitAnswerBtn" type="button" ${state.quizMySelection === null ? 'disabled' : ''}>
          Submit answer
        </button>
      </div>
    `;
  }

  return `
    <div class="quiz-view">
      <button class="back-btn" id="backBtn">← Leave</button>

      <div class="quiz-play-card">
        <div class="quiz-progress">
          <span class="quiz-progress-text">Q${qIdx + 1} / ${q.questions.length}</span>
          <div class="quiz-progress-bar"><div class="quiz-progress-fill" style="width:${progress}%"></div></div>
        </div>
        <div class="quiz-question-display">${escapeHtml(question.text)}</div>
        <div class="quiz-answer-grid">${options}</div>
        ${bottom}
      </div>
    </div>
  `;
}

function renderQuizResults() {
  const q = state.activeQuiz || state.pastQuizzes[0];
  if (!q) return `<div class="quiz-view"><button class="back-btn" id="backBtn">← Back</button><div class="quiz-empty">No quiz to show.</div></div>`;

  const scores = computeQuizScores(q);
  const stats = computeQuizStats(q);
  const ranked = q.participants
    .map(p => ({ ...p, score: scores[p.id] || 0 }))
    .sort((a, b) => b.score - a.score);

  const maxScore = q.questions.length;
  const myUserId = state.quizUser ? state.quizUser.id : null;
  const me = myUserId ? ranked.find(p => p.id === myUserId) : null;
  const myRank = me ? (ranked.findIndex(p => p.id === myUserId) + 1) : null;

  const leaderboardRows = ranked.map((p, idx) => {
    const rank = idx + 1;
    return `
      <div class="quiz-lb-row" data-rank="${rank}" style="animation-delay:${idx * 0.05}s;">
        <div class="quiz-lb-rank">${rank}${rank === 1 ? ' 🏆' : ''}</div>
        <div class="quiz-lb-name">${escapeHtml(p.name)}${p.id === q.masterId ? ' <span style="color:var(--gold);font-size:11px;font-style:italic;">(host)</span>' : ''}${p.id === myUserId ? ' <span style="color:var(--wine);font-size:11px;font-style:italic;">(you)</span>' : ''}</div>
        <div class="quiz-lb-score">${p.score}<span class="quiz-lb-score-unit">/${maxScore}</span></div>
      </div>
    `;
  }).join('');

  // Your-performance card
  let youCard = '';
  if (me && maxScore > 0) {
    const ordinal = myRank === 1 ? '1st' : myRank === 2 ? '2nd' : myRank === 3 ? '3rd' : `${myRank}th`;
    const placeText = ranked.length > 1 ? ` · placed <em>${ordinal}</em> of ${ranked.length}` : '';
    youCard = `
      <div class="quiz-you-card">
        <div class="quiz-you-label">Your score</div>
        <div class="quiz-you-line">
          <span class="score-big">${me.score}</span> of ${maxScore} correct${placeText}
        </div>
      </div>
    `;
  }

  // Overall stats tiles (only show if we have any participants and questions)
  let statsTiles = '';
  if (stats.totalP > 0 && stats.totalQ > 0) {
    statsTiles = `
      <div class="quiz-stats-tiles">
        <div class="quiz-stat-tile">
          <div class="quiz-stat-number">${stats.totalQ}</div>
          <div class="quiz-stat-label">questions</div>
        </div>
        <div class="quiz-stat-tile">
          <div class="quiz-stat-number">${stats.totalP}</div>
          <div class="quiz-stat-label">players</div>
        </div>
        <div class="quiz-stat-tile">
          <div class="quiz-stat-number">${stats.avgPct}<span class="unit">%</span></div>
          <div class="quiz-stat-label">avg correct</div>
        </div>
        <div class="quiz-stat-tile">
          <div class="quiz-stat-number">${stats.perfectCount}</div>
          <div class="quiz-stat-label">perfect round${stats.perfectCount === 1 ? '' : 's'}</div>
        </div>
      </div>
    `;
  }

  // Per-question breakdown
  let perQuestionBlock = '';
  if (stats.perQuestion.length > 0 && stats.totalP > 0) {
    const cards = stats.perQuestion.map(pq => {
      let pctClass = '';
      if (pq.pctCorrect >= 75) pctClass = 'easy';
      else if (pq.pctCorrect < 40 && pq.totalAnswered > 0) pctClass = 'hard';

      const pctText = pq.totalAnswered === 0
        ? 'no answers'
        : `${pq.pctCorrect}% correct`;

      const optionRows = pq.options.map((opt, oIdx) => {
        const votes = pq.optionVotes[oIdx];
        const pct = pq.totalAnswered === 0 ? 0 : (votes / pq.totalAnswered) * 100;
        const isCorrect = oIdx === pq.correctIndex;
        return `
          <div class="quiz-qstats-option">
            <div class="quiz-qstats-marker${isCorrect ? ' correct' : ''}">
              ${isCorrect ? '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>' : ''}
            </div>
            <div class="quiz-qstats-opt-text${isCorrect ? ' correct' : ''}">${escapeHtml(opt)}</div>
            <div class="quiz-qstats-bar-wrap">
              <div class="quiz-qstats-bar${isCorrect ? ' correct' : ''}" style="width:${pct}%;"></div>
            </div>
            <div class="quiz-qstats-votes">${votes}</div>
          </div>
        `;
      }).join('');

      return `
        <div class="quiz-qstats-card">
          <div class="quiz-qstats-head">
            <span class="quiz-qstats-num">Question ${pq.index + 1}</span>
            <span class="quiz-qstats-pct ${pctClass}">${pctText}</span>
          </div>
          <div class="quiz-qstats-text">${escapeHtml(pq.text)}</div>
          ${optionRows}
          ${pq.notAnswered > 0 ? `<div class="quiz-qstats-noanswer">${pq.notAnswered} didn't answer</div>` : ''}
        </div>
      `;
    }).join('');

    perQuestionBlock = `
      <div class="quiz-qstats-section">
        <div class="quiz-qstats-title">Question breakdown</div>
        ${cards}
      </div>
    `;
  }

  return `
    <div class="quiz-view">
      <button class="back-btn" id="backBtn">← Back to quizzes</button>
      <h1 class="quiz-title">${escapeHtml(q.title || 'Quiz')} — <em>results</em></h1>
      <div class="quiz-sub">${q.questions.length} question${q.questions.length === 1 ? '' : 's'} · ${ranked.length} participant${ranked.length === 1 ? '' : 's'}</div>

      ${statsTiles}

      ${youCard}

      <div class="quiz-qstats-title" style="margin-top:28px;">Leaderboard</div>
      <div class="quiz-leaderboard" style="margin-top:8px;">
        ${ranked.length === 0 ? '<div class="quiz-empty">No participants to score.</div>' : leaderboardRows}
      </div>

      ${perQuestionBlock}
    </div>
  `;
}

  if (filter === 'Red') filtered = filtered.filter(g => g.type === 'Red');
  else if (filter === 'White') filtered = filtered.filter(g => g.type === 'White');

  if (q) {
    filtered = filtered.filter(g => {

  return `

      <button class="back-btn" id="backBtn">← Home</button>

      <div class="grapes-header">
        <h1 class="grapes-title">Grape <em>encyclopedia</em></h1>

// ========== Render: Event ==========
function renderEvent() {
  const eventName = state.currentId;
  if (!eventName) {
    return `<div class="event-view"><button class="back-btn" id="backBtn">← Back</button><div class="event-empty">Event not found.</div></div>`;
  }

  const wines = state.wines
    .filter(w => (w.event || '') === eventName)
    .sort((a, b) => (a.createdAt || 0) - (b.createdAt || 0));

  if (wines.length === 0) {
    return `<div class="event-view"><button class="back-btn" id="backBtn">← Back</button><div class="event-empty">No wines found for this event.</div></div>`;
  }

  const dates = wines.map(w => w.date).filter(Boolean).sort();
  let dateStr = '';
  if (dates.length) {
    dateStr = dates[0] === dates[dates.length - 1]
      ? formatDate(dates[0])
      : `${formatDate(dates[0])} — ${formatDate(dates[dates.length - 1])}`;
  }

  const rankedCount = wines.filter(w => w.eventRank).length;
  const metaLine = [
    `${wines.length} wine${wines.length === 1 ? '' : 's'}`,
    dateStr,
    rankedCount > 0 ? `${rankedCount} ranked` : ''
  ].filter(Boolean).join(' · ');

  return `
    <div class="event-view">
      <button class="back-btn" id="backBtn">← Back</button>
      <div class="event-header">
        <div class="event-subtitle">Tasting event</div>
        <h1 class="event-title">${escapeHtml(eventName)}</h1>
        <div class="event-meta-line">${metaLine}</div>
      </div>

      <div class="event-list">
        ${wines.map(w => renderEventWineRow(w)).join('')}
      </div>
    </div>
  `;
}

function renderEventWineRow(w) {
  const subtitleParts = [];
  if (w.producer) subtitleParts.push(w.producer);
  if (w.region) subtitleParts.push(w.region);
  if (w.grape) subtitleParts.push(w.grape);
  const subtitle = subtitleParts.join(' · ');
  const rank = w.eventRank || '';

  const rankBtns = SCALE.map(s => `
    <button class="event-rank-btn ${rank === s.value ? 'active' : ''}"
      data-rank-wine-id="${w.id}" data-rank="${s.value}" type="button"
      aria-label="Rank ${s.desc}">${s.label}</button>
  `).join('');

  return `
    <div class="event-wine-row" data-wine-id="${w.id}" data-colour="${escapeHtml(w.colour || '')}">
      <div class="event-wine-info" data-event-wine-id="${w.id}" role="button" tabindex="0">
        <div class="event-wine-head">
          <div class="event-wine-title">${escapeHtml(w.name || 'Untitled')}</div>
          ${w.vintage ? `<span class="event-wine-vintage">${escapeHtml(w.vintage)}</span>` : ''}
          ${w.rating ? `<span class="rating" style="margin-left:auto">${Array.from({length:5},(_,i)=>`<span class="rating-dot${i<w.rating?' filled':''}"></span>`).join('')}</span>` : ''}
        </div>
        ${subtitle ? `<div class="event-wine-subtitle">${escapeHtml(subtitle)}</div>` : ''}
      </div>
      <div class="event-rank">${rankBtns}</div>
    </div>
  `;
}

// ========== Datalists (autocomplete suggestions) ==========
function uniqueValuesOf(key) {
  const set = new Set();
  state.wines.forEach(w => {
    const v = ((w[key] || '') + '').trim();
    if (v) set.add(v);
  });
  return [...set].sort((a, b) => a.localeCompare(b));
}

function buildDatalists() {
  const groups = [
    { id: 'dl-producers', values: uniqueValuesOf('producer') },
    { id: 'dl-regions',   values: uniqueValuesOf('region')   },
    { id: 'dl-grapes',    values: uniqueValuesOf('grape')    },
    { id: 'dl-events',    values: uniqueValuesOf('event')    },
  ];
  return groups.map(g => {
    if (g.values.length === 0) return '';
    const opts = g.values.map(v => `<option value="${escapeHtml(v)}">`).join('');
    return `<datalist id="${g.id}">${opts}</datalist>`;
  }).join('');
}

// ========== Render: Form ==========
function scaleOptions(selected) {
  const none = `<option value=""${!selected ? ' selected' : ''}>—</option>`;
  const opts = SCALE.map(s =>
    `<option value="${s.value}"${s.value === selected ? ' selected' : ''}>${s.label}  ${s.desc}</option>`
  ).join('');
  return none + opts;
}

function selectOptions(list, selected) {
  const none = `<option value=""${!selected ? ' selected' : ''}>—</option>`;
  const opts = list.map(v =>
    `<option value="${escapeHtml(v)}"${v === selected ? ' selected' : ''}>${escapeHtml(v)}</option>`
  ).join('');
  return none + opts;
}

  let html = '';
